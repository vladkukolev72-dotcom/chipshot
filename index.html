function saveCampaignProgress() {
    try {
        localStorage.setItem('camp_highest_unlocked', campaignHighestUnlocked);
        localStorage.setItem('camp_stars', JSON.stringify(campaignStars));
    } catch(e) {
        console.error("Local storage not supported or failed to save campaign progress.", e);
    }
}

function loadCampaignProgress() {
    try {
        let storedUnlocked = localStorage.getItem('camp_highest_unlocked');
        if (storedUnlocked !== null) {
            campaignHighestUnlocked = parseInt(storedUnlocked);
        } else {
            campaignHighestUnlocked = 0;
        }
        let storedStars = localStorage.getItem('camp_stars');
        if (storedStars !== null) {
            campaignStars = JSON.parse(storedStars);
        } else {
            campaignStars = Array(CAMPAIGN_LEVELS.length).fill(0);
        }
    } catch(e) {
        console.error("Local storage error loading campaign progress.", e);
        campaignHighestUnlocked = 0;
        campaignStars = Array(CAMPAIGN_LEVELS.length).fill(0);
    }
}

function setCampaignLevelStars(lvlIdx, starsCount) {
    if (lvlIdx >= 0 && lvlIdx < CAMPAIGN_LEVELS.length) {
        if (!campaignStars || campaignStars.length === 0) {
            campaignStars = Array(CAMPAIGN_LEVELS.length).fill(0);
        }
        if (starsCount > (campaignStars[lvlIdx] || 0)) {
            campaignStars[lvlIdx] = starsCount;
            saveCampaignProgress();
        }
    }
}

function getCampaignLevelStars(lvlIdx) {
    if (!campaignStars || campaignStars.length === 0) {
        return 0;
    }
    return campaignStars[lvlIdx] || 0;
}

function getCampaignTotalStars() {
    let totalStars = 0;
    for (let i = 0; i < CAMPAIGN_LEVELS.length; i++) {
        totalStars += getCampaignLevelStars(i);
    }
    return totalStars;
}

function isColorLocked(idx) {
    let col = TEAM_COLORS[idx];
    if (col && col.reqStars) {
        return getCampaignTotalStars() < col.reqStars;
    }
    return false;
}

function getNextUnlockedColorIdx(currentIdx, direction) {
    let steps = 0;
    let idx = currentIdx;
    let total = getCampaignTotalStars();
    
    do {
        idx = (idx + direction + TEAM_COLORS.length) % TEAM_COLORS.length;
        let col = TEAM_COLORS[idx];
        if (!col.reqStars || total >= col.reqStars) {
            return idx;
        }
        steps++;
    } while (steps < TEAM_COLORS.length);
    
    return currentIdx;
}

function triggerVibrate(ms) {

function playMenuSound() {

        let playPromise = gameSounds['click'].play();

            playPromise.catch(e => console.log("Menu sound error"));
        }

}

function initAudio() {
    if (audioInitialized) return; 
    
    try {
        // ИСПРАВЛЕНИЕ: Только твои новые уникальные файлы из корня гитхаба
        const soundFiles = {
            'ball_shot':    'ball_shot.mp3',
            'ball_wall':    'chip_bounce.mp3',
            'chip_bounce':  'chip_bounce.mp3',
            'collide_chip': 'chip_bounce.mp3',
            'score':        'score.mp3',
            'over':         'over.mp3',
            'click':        'click.mp3'
        };

        for (let key in soundFiles) {
            gameSounds[key] = new Audio(soundFiles[key]);
            gameSounds[key].preload = 'auto';
        }
        
        audioInitialized = true;
        console.log("Звуковой движок успешно запущен с новыми файлами!");
    } catch (e) {
        console.error("Ошибка инициализации звука:", e);
    }
}

function playSound(type, volume = 1.0) {
    try {
        if (typeof soundEnabled !== 'undefined' && !soundEnabled) return;
        
        initAudio(); 

        let soundKey = type;

        // ИСПРАВЛЕНИЕ: Маппинг старых названий вызовов на твои новые файлы, 
        // чтобы игра не ломалась, если в других частях кода вызываются старые типы.
        if (type === 'hit' || type === 'ball_hit') {
            soundKey = 'ball_shot';
        } else if (type === 'wall') {
            soundKey = 'ball_wall';
        } else if (type === 'chips_hit' || type === 'chip_hit' || type === 'collide_chip') {
            soundKey = 'collide_chip';
        } else if (type === 'chip_wall' || type === 'chip_bounce') {
            soundKey = 'chip_bounce';
        } else if (type === 'goal' || type === 'goal_cheer') {
            soundKey = 'score';
        }

        if (gameSounds && gameSounds[soundKey]) {
            let audio = gameSounds[soundKey];
            
            if (audio && typeof audio.play === 'function') {
                let safeVolume = volume;
                if (safeVolume > 1.0) safeVolume = 1.0;
                if (safeVolume < 0.0) safeVolume = 0.0;
                
                try {
                    audio.volume = safeVolume;
                } catch (volErr) {
                    console.warn("Не удалось установить громкость для " + soundKey, volErr);
                }
                
                try {
                    audio.currentTime = 0; // Мгновенный старт звука
                } catch (timeErr) {
                    // Игнорируем ошибку, если аудио не полностью загружено
                }
                
                let playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function(error) {
                        console.log("Audio play error/waiting for user interaction for " + soundKey, error);
                    });
                }
            }
        }
    } catch (globalSoundError) {
        console.error("Ошибка в playSound:", globalSoundError);
    }
}

function drawStar(x, y, radius1, radius2, npoints) {
    let angle = TWO_PI / npoints;
    let halfAngle = angle / 2.0;
    beginShape();
    for (let a = -HALF_PI; a < TWO_PI - HALF_PI; a += angle) {
        let sx = x + cos(a) * radius2;
        let sy = y + sin(a) * radius2;
        vertex(sx, sy);
        sx = x + cos(a + halfAngle) * radius1;
        sy = y + sin(a + halfAngle) * radius1;
        vertex(sx, sy);
    }
    endShape(CLOSE);
}

function updateLevelModifiers() {
    activeModifiers = [];
    goalW = defaultGoalW; 
    if (!isCampaign || !fieldW) return;

    let lvl = CAMPAIGN_LEVELS[currentLevel];
    if (!lvl) return;

    for (let i = 0; i < (lvl.sandCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        activeModifiers.push({
            x: randX, y: randY, w: random(70, 100), h: random(70, 100),
            type: 'mud', color: 'rgba(139, 69, 19, 0.32)', label: '░',
            forceX: 0, forceY: 0
        });
    }

    for (let i = 0; i < (lvl.iceCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        activeModifiers.push({
            x: randX, y: randY, w: random(80, 110), h: random(80, 110),
            type: 'ice', color: 'rgba(0, 255, 255, 0.25)', label: '❄',
            forceX: 0, forceY: 0
        });
    }

    let isRedWind = (lvl.mod === 'fast_ball' || lvl.mod === 'chaos');
    let windColor = isRedWind ? 'rgba(255, 50, 50, 0.35)' : 'rgba(0, 191, 255, 0.32)';
    
    for (let i = 0; i < (lvl.windCount || 0); i++) {
        let randX = fieldX + random(60, fieldW - 140);
        let randY = fieldY + random(60, fieldH - 140);
        let angle = random(TWO_PI);
        let fx = cos(angle) * (isRedWind ? 0.28 : 0.16); 
        let fy = sin(angle) * (isRedWind ? 0.28 : 0.16);
        let lbl = '→';
        if (abs(fx) > abs(fy)) { lbl = fx > 0 ? '→' : '←'; } else { lbl = fy > 0 ? '↓' : '↑'; }

        activeModifiers.push({
            x: randX, y: randY, w: random(80, 110), h: random(80, 110),
            type: 'wind', color: windColor, label: lbl,
            forceX: fx, forceY: fy
        });
    }
}

function drawModifiers() {
    if (!isCampaign || activeModifiers.length === 0 || isEditingTactic) return;
    push();
    activeModifiers.forEach(zone => {
        noStroke();
        fill(zone.color);
        rect(zone.x, zone.y, zone.w, zone.h, 10);
        if (zone.color.includes('255, 50')) fill(255, 0, 0, 180); else fill(255, 130);
        textSize(24); textAlign(CENTER, CENTER);
        text(zone.label, zone.x + zone.w / 2, zone.y + zone.h / 2);
    });
    pop();
}

class Entity {
    constructor(x, y, d, color, isBall) {
        this.p = createVector(x, y); 
        this.v = createVector(0, 0); 
        this.d = d;                   
        this.color = color;
        this.isBall = isBall;
        this.mass = isBall ? 1.0 : (d > 45 ? 12.0 : 6.0); 
        this.trail = [];
        this.spawnScale = 0;
        
        let centerPitchX = (typeof fieldX !== 'undefined') ? (fieldX + fieldW / 2) : width / 2;
        let centerPitchY = (typeof fieldY !== 'undefined') ? (fieldY + fieldH / 2) : height / 2;
        let dFromCenter = dist(x, y, centerPitchX, centerPitchY);
        this.spawnDelay = map(dFromCenter, 0, 420, 0, 24); 
    }

    update() {
        if (isResettingPositions || isEvacuating || matchWinner || isGoalCelebrating) return;

        this.p.add(this.v);
        let currentFriction = FRICTION;
        let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;

        if (isCampaign && lvl) {
            if (lvl.scenario === 'slalom' || lvl.scenario === 'chaos_arena') {
                currentFriction = 0.982; // Nerfed background ice friction (was 0.995) to be playable!
            }
        }

        if (isCampaign) {
            activeModifiers.forEach(zone => {
                if (this.p.x > zone.x && this.p.x < zone.x + zone.w &&
                    this.p.y > zone.y && this.p.y < zone.y + zone.h) {
                    if (zone.type === 'mud') currentFriction = FRICTION * 0.90; 
                    if (zone.type === 'ice') currentFriction = 0.985; // Nerfed ice zone friction (was 0.998) to be playable!
                    if (zone.type === 'wind') { this.v.x += zone.forceX; this.v.y += zone.forceY; }
                }
            });
        }

        // Apply campaign safety dampening if a turn is rolling for too long (prevent forever sliding/spinning)
        if (isCampaign && campaignRollingFrameCounter > 210) {
            currentFriction *= 0.88;
        }

        this.v.mult(currentFriction); 
        if (this.v.mag() < 0.08) this.v.set(0, 0);

        // Spark special effects for unlocked team colors
        if (this.v.mag() > 1.2 && !this.isBall) {
            if (frameCount % 4 === 0) {
                if (this.color === '#00ffcc') { // Jade Matrix
                    particles.push(new Particle(this.p.x + random(-8,8), this.p.y + random(-8,8), '#00ffcc', 0.4));
                } else if (this.color === '#ffd700') { // Gold Crystal
                    particles.push(new Particle(this.p.x + random(-8,8), this.p.y + random(-8,8), '#ffd700', 0.4));
                } else if (this.color === '#d500f9') { // Dark Matter
                    particles.push(new Particle(this.p.x + random(-8,8), this.p.y + random(-8,8), '#d500f9', 0.4));
                }
            }
        }

        if (this.isBall) {
            if (this.v.mag() > 0.5) { ballTrail.push({ x: this.p.x, y: this.p.y, alpha: 180 }); }
            if (ballTrail.length > 15) ballTrail.shift();
        } else {
            if (this.v.mag() > 0.8) {
                this.trail.push({ x: this.p.x, y: this.p.y, alpha: 180 });
            }
            if (this.trail.length > 12) this.trail.shift();
            for (let i = this.trail.length - 1; i >= 0; i--) {
                this.trail[i].alpha -= 8;
            }
            this.trail = this.trail.filter(pt => pt.alpha > 0);
        }

        let r = this.d / 2;
        let goalX = fieldX + fieldW/2;
        
        let currentTopGoalW = goalW;
        let currentBotGoalW = goalW;
        if (isCampaign && lvl) {
            if (lvl.scenario === 'striker') {
                currentTopGoalW = goalW * 0.55;
                currentBotGoalW = goalW * 1.45;
            }
        }

        let leftPostXTop = goalX - currentTopGoalW/2;
        let rightPostXTop = goalX + currentTopGoalW/2;
        let leftPostXBot = goalX - currentBotGoalW/2;
        let rightPostXBot = goalX + currentBotGoalW/2;

        if (this.p.y < fieldY) {
            if (this.p.x > leftPostXTop && this.p.x < rightPostXTop) {
                if (isKickOffActive && this.isBall) {
                    this.p.y = fieldY + r;
                    this.v.y *= -0.8;
                    triggerVibrate(20);
                    playSound('wall', abs(this.v.y)/5);
                    createSparks(this.p.x, this.p.y, '#0096ff', abs(this.v.y)*2.5);
                } else if (this.p.y < fieldY - goalH + r) { this.p.y = fieldY - goalH + r; this.v.y *= -0.8; }
            }
        }
        if (this.p.y > fieldY + fieldH) {
            if (this.p.x > leftPostXBot && this.p.x < rightPostXBot) {
                if (isKickOffActive && this.isBall) {
                    this.p.y = fieldY + fieldH - r;
                    this.v.y *= -0.8;
                    triggerVibrate(20);
                    playSound('wall', abs(this.v.y)/5);
                    createSparks(this.p.x, this.p.y, '#0096ff', abs(this.v.y)*2.5);
                } else if (this.p.y > fieldY + fieldH + goalH - r) { this.p.y = fieldY + fieldH + goalH - r; this.v.y *= -0.8; }
            }
        }

        if (this.p.y < fieldY && this.p.y > fieldY - goalH) {
            if (this.p.x > leftPostXTop - r && this.p.x < rightPostXTop + r) {
                if (this.p.x < leftPostXTop + r) { this.p.x = leftPostXTop + r; this.v.x *= -0.8; playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); }
                if (this.p.x > rightPostXTop - r) { this.p.x = rightPostXTop - r; this.v.x *= -0.8; playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); }
            }
        }
        if (this.p.y > fieldY + fieldH && this.p.y < fieldY + fieldH + goalH) {
            if (this.p.x > leftPostXBot - r && this.p.x < rightPostXBot + r) {
                if (this.p.x < leftPostXBot + r) { this.p.x = leftPostXBot + r; this.v.x *= -0.8; playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); }
                if (this.p.x > rightPostXBot - r) { this.p.x = rightPostXBot - r; this.v.x *= -0.8; playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); }
            }
        }

        let collidedWithPost = false;
        if (this.p.y < fieldY + 15 && this.p.y > fieldY - 15) {
            let dLeft = dist(this.p.x, this.p.y, leftPostXTop, fieldY);
            if (dLeft < r + 4) {
                let norm = createVector(this.p.x - leftPostXTop, this.p.y - fieldY).normalize();
                this.p.set(leftPostXTop + norm.x * (r + 4.5), fieldY + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
                collidedWithPost = true;
            }
            if (!collidedWithPost) {
                let dRight = dist(this.p.x, this.p.y, rightPostXTop, fieldY);
                if (dRight < r + 4) {
                    let norm = createVector(this.p.x - rightPostXTop, this.p.y - fieldY).normalize();
                    this.p.set(rightPostXTop + norm.x * (r + 4.5), fieldY + norm.y * (r + 4.5));
                    this.v.reflect(norm).mult(0.8);
                    playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
                    collidedWithPost = true;
                }
            }
        }
        let collidedWithPostBot = false;
        if (this.p.y > fieldY + fieldH - 15 && this.p.y < fieldY + fieldH + 15) {
            let dLeft = dist(this.p.x, this.p.y, leftPostXBot, fieldY + fieldH);
            if (dLeft < r + 4) {
                let norm = createVector(this.p.x - leftPostXBot, this.p.y - (fieldY + fieldH)).normalize();
                this.p.set(leftPostXBot + norm.x * (r + 4.5), (fieldY + fieldH) + norm.y * (r + 4.5));
                this.v.reflect(norm).mult(0.8);
                playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
                collidedWithPostBot = true;
            }
            if (!collidedWithPostBot) {
                let dRight = dist(this.p.x, this.p.y, rightPostXBot, fieldY + fieldH);
                if (dRight < r + 4) {
                    let norm = createVector(this.p.x - rightPostXBot, this.p.y - (fieldY + fieldH)).normalize();
                    this.p.set(rightPostXBot + norm.x * (r + 4.5), (fieldY + fieldH) + norm.y * (r + 4.5));
                    this.v.reflect(norm).mult(0.8);
                    playSound(this.isBall ? 'wall' : 'chip_wall', this.v.mag() / 5);
                    collidedWithPostBot = true;
                }
            }
        }

        if (this.p.x < fieldX + r) { this.p.x = fieldX + r; this.v.x *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.x)*2); }
        if (this.p.x > fieldX + fieldW - r) { this.p.x = fieldX + fieldW - r; this.v.x *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.x)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.x)*2); }
        if (!collidedWithPost && this.p.y < fieldY + r) {
            if (this.p.x < leftPostXTop || this.p.x > rightPostXTop) { this.p.y = fieldY + r; this.v.y *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.y)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.y)*2); }
        }
        if (!collidedWithPostBot && this.p.y > fieldY + fieldH - r) {
            if (this.p.x < leftPostXBot || this.p.x > rightPostXBot) { this.p.y = fieldY + fieldH - r; this.v.y *= -0.8; triggerVibrate(15); playSound(this.isBall ? 'wall' : 'chip_wall', abs(this.v.y)/5); createSparks(this.p.x, this.p.y, BORDER_COLOR, abs(this.v.y)*2); }
        }
    }

    display(isAnyEntityMoving) {
        if (globalSpawnAlpha === 255) {
            this.spawnScale = 1.0;
        } else {
            let framesSinceSpawnStart = globalSpawnAlpha / 5.5;
            if (framesSinceSpawnStart > this.spawnDelay) {
                let t = (framesSinceSpawnStart - this.spawnDelay) / 22; 
                if (t > 1) t = 1;
                if (t < 0) t = 0;
                this.spawnScale = t === 1 ? 1 : 1 - Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (TWO_PI / 3));
            } else {
                this.spawnScale = 0;
            }
        }

        if (this.spawnScale <= 0.01) return; 

        push();
        let currentEntityAlpha = this.isBall ? 255 : (isEditingTactic ? 255 : globalSpawnAlpha);
        let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;

        if (this.isBall) {
            fill(0, map(currentEntityAlpha, 0, 255, 0, 75)); noStroke();
            ellipse(this.p.x + 3 * this.spawnScale, this.p.y + 4 * this.spawnScale, this.d * this.spawnScale); 

            if (this.v.mag() === 0 && !isResettingPositions && !isEvacuating && !matchWinner && !isEditingTactic && !isGoalCelebrating) ballAuraAlpha = lerp(ballAuraAlpha, 110, 0.05);
            else ballAuraAlpha = 0; 
            if (ballAuraAlpha > 0) {
                fill(255, 255, 190, ballAuraAlpha * this.spawnScale); 
                ellipse(this.p.x, this.p.y, this.d * 2.2 * this.spawnScale);
            }
            
            push(); 
            translate(this.p.x, this.p.y); 
            scale(this.spawnScale);
            fill(255); stroke(40); 
            strokeWeight(3); ellipse(0, 0, this.d); 
            
            let dotSize = (this.d / 2) * 0.9; 
            let offset = (this.d / 2) - dotSize / 2 - 0.5; 
            fill(40); 
            noStroke(); ellipse(-offset, 0, dotSize); ellipse(offset, 0, dotSize);  
            pop();
        } else {
            push();
            for (let i = 0; i < this.trail.length; i++) {
                let pt = this.trail[i];
                let size = map(i, 0, this.trail.length - 1, this.d * 0.25, this.d * 0.85) * this.spawnScale;
                let alpha = map(i, 0, this.trail.length - 1, 5, pt.alpha);
                
                let c = color(this.color);
                c.setAlpha(alpha * 0.35);
                
                if (this.color === '#00ffcc') {
                    // Matrix Jade Square Trail
                    rectMode(CENTER);
                    fill(c);
                    noStroke();
                    rect(pt.x, pt.y, size, size, 3);
                } else if (this.color === '#ffd700') {
                    // Gold Crystal Star Trail
                    fill(c);
                    noStroke();
                    drawStar(pt.x, pt.y, size * 0.22, size * 0.45, 5);
                } else if (this.color === '#d500f9') {
                    // Dark Matter Void Ring Trail
                    noFill();
                    stroke(c);
                    strokeWeight(map(i, 0, this.trail.length - 1, 1, 3));
                    ellipse(pt.x, pt.y, size);
                } else {
                    // Standard Trail
                    noStroke();
                    fill(c);
                    ellipse(pt.x, pt.y, size);
                }
            }
            pop();

            fill(0, map(currentEntityAlpha, 0, 255, 0, 80)); noStroke();
            ellipse(this.p.x + 4 * this.spawnScale, this.p.y + 5 * this.spawnScale, this.d * this.spawnScale);

            if (this.color === currentTurn && orbitAlpha > 0.5 && !isEditingTactic && !isResettingPositions && !isEvacuating && !matchWinner && !isGoalCelebrating) {
                let orbitCol = color(0, map(orbitAlpha, 0, 255, 0, currentEntityAlpha));
                if (this.color === '#00ffcc') orbitCol = color(0, 255, 204, map(orbitAlpha, 0, 255, 0, currentEntityAlpha));
                else if (this.color === '#ffd700') orbitCol = color(255, 215, 0, map(orbitAlpha, 0, 255, 0, currentEntityAlpha));
                else if (this.color === '#d500f9') orbitCol = color(213, 0, 249, map(orbitAlpha, 0, 255, 0, currentEntityAlpha));
                
                stroke(orbitCol);
                strokeWeight(3.5); noFill();
                let numSegments = 6; let segmentLength = (TWO_PI / numSegments) * 0.45; 
                push(); translate(this.p.x, this.p.y); rotate(orbitAngle * 0.5); 
                for (let i = 0; i < numSegments; i++) {
                    let startAngle = i * (TWO_PI / numSegments);
                    arc(0, 0, this.d * 1.45 * this.spawnScale, this.d * 1.45 * this.spawnScale, startAngle, startAngle + segmentLength);
                }
                pop();
            }

            stroke(0, currentEntityAlpha); strokeWeight(4.25);
            fill(this.color);
            
            ellipse(this.p.x, this.p.y, this.d * this.spawnScale);
            fill(255, currentEntityAlpha); noStroke();
            push();
            translate(this.p.x, this.p.y);
            scale(this.spawnScale);
            drawStar(0, 0, this.d * 0.15, this.d * 0.32, 5);
            pop();
        }
        pop();
    }

    checkGoal() {
        if (!this.isBall || isResettingPositions || isEvacuating || isEditingTactic || matchWinner || isGoalCelebrating || isKickOffActive) return false;

        if (this.p.y < fieldY - 3) { 
            let scoringTeam = PLAYER1_COLOR; let nextTurnTeam = PLAYER2_COLOR; 
            if (lastTouchColor === PLAYER2_COLOR) { goalOverlayText = 'АВТОГОЛ!'; scoringTeam = PLAYER1_COLOR; nextTurnTeam = PLAYER2_COLOR; p1Goals++; } 
            else { goalOverlayText = 'ГОЛ!'; p1Goals++; }
            
            triggerVibrate(60); 
            createGoalBurstParticles(this.p.x, fieldY, scoringTeam, true);
            
            playSound('goal', 0.85); // Воспроизводим звук гола до проверки победы, чтобы он всегда звучал
            if (p1Goals >= maxGoalsToWin || isGoldenGoalActive) { triggerWin(isTournament ? tourRounds[currentRoundIdx][currentMatchIdx].t1.name : 'КРАСНЫЕ'); return true; }
            
            startGoalCelebrationPhase(scoringTeam, nextTurnTeam);
            return true; 
        } 

        if (this.p.y > fieldY + fieldH + 3) { 
            let scoringTeam = PLAYER2_COLOR; let nextTurnTeam = PLAYER1_COLOR; 
            if (lastTouchColor === PLAYER1_COLOR) { goalOverlayText = 'АВТОГОЛ!'; scoringTeam = PLAYER2_COLOR; nextTurnTeam = PLAYER1_COLOR; p2Goals++; } 
            else { goalOverlayText = 'ГОЛ!'; p2Goals++; }
            
            triggerVibrate(60); 
            createGoalBurstParticles(this.p.x, fieldY + fieldH, scoringTeam, false);
            
            playSound('goal', 0.85); // Воспроизводим звук гола до проверки победы, чтобы он всегда звучал
            if (p2Goals >= maxGoalsToWin || isGoldenGoalActive) { triggerWin(isTournament ? tourRounds[currentRoundIdx][currentMatchIdx].t2.name : 'СИНИЕ'); return true; }
            
            startGoalCelebrationPhase(scoringTeam, nextTurnTeam);
            return true; 
        } 
        return false;
    }
}

class Particle {
    constructor(x, y, color, speedMult = 1) {
        this.p = createVector(x, y); 
        this.v = p5.Vector.random2D().mult(random(2, 5) * speedMult);
        this.alpha = 255; this.color = color; this.size = random(3, 5);
    }
    update() { this.p.add(this.v); this.v.mult(0.95); this.alpha -= 6; }
    display() {
        push(); noStroke(); let c = color(this.color); c.setAlpha(this.alpha);
        fill(c); ellipse(this.p.x, this.p.y, this.size); pop();
    }
}

class GoalBurstParticle {
    constructor(x, y, color, isTopGoal) {
        this.p = createVector(x, y);
        let angle = isTopGoal ? random(0.2, PI - 0.2) : random(-PI + 0.2, -0.2);
        this.v = createVector(cos(angle), sin(angle)).mult(random(3, 7));
        this.alpha = 255;
        this.color = color;
        this.size = random(4, 6);
    }
    update() { this.p.add(this.v); this.v.mult(0.96); this.alpha -= 5; }
    display() {
        push(); noStroke(); let c = color(this.color); c.setAlpha(this.alpha);
        fill(c); ellipse(this.p.x, this.p.y, this.size); pop();
    }
}

class SparkLine {
    constructor(x, y, color, angle, speed) {
        this.p = createVector(x, y);
        this.v = createVector(cos(angle), sin(angle)).mult(speed);
        this.length = random(10, 22);
        this.alpha = 255;
        this.color = color;
        this.decay = random(6, 11);
    }
    update() {
        this.p.add(this.v);
        this.v.mult(0.94);
        this.alpha -= this.decay;
    }
    display() {
        push();
        strokeWeight(random(1.5, 3));
        let c = color(this.color);
        c.setAlpha(this.alpha);
        stroke(c);
        let endP = p5.Vector.add(this.p, p5.Vector.mult(this.v, this.length * 0.15));
        line(this.p.x, this.p.y, endP.x, endP.y);
        pop();
    }
}

class GrassParticle {
    constructor(x, y) {
        this.p = createVector(x, y);
        this.v = p5.Vector.random2D().mult(random(1, 3.5));
        this.alpha = 255;
        let greenColors = ['#2e7d32', '#4caf50', '#81c784', '#1b5e20', '#aed581'];
        this.color = random(greenColors);
        this.sizeW = random(2, 4);
        this.sizeH = random(6, 12);
        this.angle = random(TWO_PI);
        this.rotSpeed = random(-0.2, 0.2);
    }
    update() {
        this.p.add(this.v);
        this.v.y += 0.08; 
        this.v.mult(0.96);
        this.angle += this.rotSpeed;
        this.alpha -= 5;
    }
    display() {
        push();
        translate(this.p.x, this.p.y);
        rotate(this.angle);
        noStroke();
        let c = color(this.color);
        c.setAlpha(this.alpha);
        fill(c);
        rect(-this.sizeW/2, -this.sizeH/2, this.sizeW, this.sizeH, 1);
        pop();
    }
}

class SmokeRing {
    constructor(x, y, maxRadius, color = '#ffffff') {
        this.p = createVector(x, y);
        this.r = 5;
        this.maxRadius = maxRadius;
        this.alpha = 200;
        this.color = color;
        this.growSpeed = random(2.5, 4.5);
    }
    update() {
        this.r += this.growSpeed;
        this.alpha = map(this.r, 5, this.maxRadius, 200, 0);
    }
    display() {
        if (this.alpha <= 0) return;
        push();
        noFill();
        let c = color(this.color);
        c.setAlpha(this.alpha);
        stroke(c);
        strokeWeight(map(this.r, 5, this.maxRadius, 4, 0.5));
        ellipse(this.p.x, this.p.y, this.r * 2);
        pop();
    }
}

class ConfettiParticle {
    constructor(x, y, color) {
        this.p = createVector(x, y);
        this.v = createVector(random(-2, 2), random(2, 6));
        this.alpha = 255;
        this.color = color;
        this.w = random(6, 12);
        this.h = random(4, 8);
        this.angleX = random(TWO_PI);
        this.angleY = random(TWO_PI);
        this.rotX = random(-0.1, 0.1);
        this.rotY = random(-0.1, 0.1);
        this.swaySpeed = random(0.02, 0.06);
        this.swayOffset = random(100);
    }
    update() {
        this.v.x = sin(frameCount * this.swaySpeed + this.swayOffset) * 1.5;
        this.p.add(this.v);
        this.angleX += this.rotX;
        this.angleY += this.rotY;
        this.alpha -= 2.2;
    }
    display() {
        push();
        translate(this.p.x, this.p.y);
        rotate(this.angleX);
        noStroke();
        let c = color(this.color);
        c.setAlpha(this.alpha);
        fill(c);
        let displayW = this.w * cos(this.angleY);
        let displayH = this.h * sin(this.angleX);
        rect(-displayW/2, -displayH/2, displayW, displayH);
        pop();
    }
}

class FireworkRocket {
    constructor(startX, startY, targetY, teamColor) {
        this.p = createVector(startX, startY);
        let dx = random(-1.5, 1.5);
        let dy = random(-10, -7);
        this.v = createVector(dx, dy);
        this.targetY = targetY;
        this.teamColor = teamColor;
        this.alpha = 255;
        this.exploded = false;
    }
    update() {
        this.p.add(this.v);
        this.v.y += 0.05; 
        if (random() < 0.4) {
            particles.push(new Particle(this.p.x, this.p.y, '#ffd700', 0.2));
        }
        if (this.v.y >= 0 || this.p.y <= this.targetY) {
            this.explode();
            this.exploded = true;
            this.alpha = 0; 
        }
    }
    explode() {
        playSound('hit', 0.85);
        let numSparks = random(18, 28);
        for (let i = 0; i < numSparks; i++) {
            let angle = (TWO_PI / numSparks) * i + random(-0.1, 0.1);
            let speed = random(2.5, 6.5);
            particles.push(new SparkLine(this.p.x, this.p.y, this.teamColor, angle, speed));
        }
        particles.push(new SmokeRing(this.p.x, this.p.y, 75, this.teamColor));
        for (let i = 0; i < 12; i++) {
            particles.push(new Particle(this.p.x, this.p.y, random(['#ffffff', '#ffd700', this.teamColor]), 1.5));
        }
    }
    display() {
        if (this.exploded) return;
        push();
        noStroke();
        fill('#ffffff');
        ellipse(this.p.x, this.p.y, 6, 6);
        fill(this.teamColor);
        ellipse(this.p.x, this.p.y, 4, 4);
        pop();
    }
}

function createSparks(x, y, color, intensity) {
    if (particles.length > 250 || matchWinner) return; 
    let count = constrain(map(intensity, 0, 10, 2, 7), 2, 10);
    
    for(let i=0; i<count; i++) {
        particles.push(new Particle(x, y, color, map(intensity, 0, 10, 0.7, 1.4)));
    }
    
    let sparkLinesCount = constrain(floor(intensity * 0.8), 1, 6);
    for (let i = 0; i < sparkLinesCount; i++) {
        let angle = random(TWO_PI);
        let speed = random(1, 4.5) * (1 + intensity * 0.1);
        particles.push(new SparkLine(x, y, color, angle, speed));
    }
    
    if (y > fieldY && y < fieldY + fieldH) {
        let grassCount = constrain(floor(intensity * 0.6), 1, 4);
        for (let i = 0; i < grassCount; i++) {
            particles.push(new GrassParticle(x, y));
        }
    }
    
    if (intensity > 4.5) {
        particles.push(new SmokeRing(x, y, map(intensity, 4.5, 15, 30, 80), color));
        shakeAmount = max(shakeAmount, map(intensity, 4.5, 15, 1.5, 7));
    }
}

function createGoalBurstParticles(x, y, teamColor, isTopGoal) {
    for (let i = 0; i < 20; i++) { 
        particles.push(new GoalBurstParticle(x, y, teamColor, isTopGoal));
    }
    particles.push(new SmokeRing(x, y, 110, teamColor));
    particles.push(new SmokeRing(x, y, 70, '#ffffff'));
    shakeAmount = 14;
    
    particles.push(new FireworkRocket(width * 0.2, height, height * random(0.25, 0.45), teamColor));
    particles.push(new FireworkRocket(width * 0.5, height, height * random(0.15, 0.35), teamColor));
    particles.push(new FireworkRocket(width * 0.8, height, height * random(0.25, 0.45), teamColor));
}

function createShieldDeactivationSparkles() {
    let topGoalW = goalW;
    let botGoalW = goalW;
    let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;
    if (isCampaign && lvl && lvl.scenario === 'striker') {
        topGoalW = goalW * 0.55;
        botGoalW = goalW * 1.45;
    }
    
    // Top goal sparks
    let startXTop = fieldX + fieldW/2 - topGoalW/2;
    for (let i = 0; i <= 10; i++) {
        let x = startXTop + (topGoalW / 10) * i;
        createSparks(x, fieldY, '#0096ff', 3);
    }
    // Bottom goal sparks
    let startXBot = fieldX + fieldW/2 - botGoalW/2;
    for (let i = 0; i <= 10; i++) {
        let x = startXBot + (botGoalW / 10) * i;
        createSparks(x, fieldY + fieldH, '#0096ff', 3);
    }
    playSound('chip_wall', 0.5);
}

function drawBallTrail() {
    if (matchWinner || isEditingTactic) return; 
    push();
    let isRedTrail = false;

    for (let i = 0; i < ballTrail.length; i++) {
        let pt = ballTrail[i];
        let size = map(i, 0, ballTrail.length - 1, 4, 14);
        let alpha = map(i, 0, ballTrail.length - 1, 10, pt.alpha);
        noStroke(); 
        if (isRedTrail) fill(255, 30, 30, alpha * 0.7); else fill(255, alpha * 0.45); 
        ellipse(pt.x, pt.y, size);
        pt.alpha -= 1.8;
    }
    for (let i = ballTrail.length - 1; i >= 0; i--) { if (ballTrail[i].alpha <= 0) ballTrail.splice(i, 1); }
    pop();
}

function draw() {
    push();

    background(ORIGINAL_BG);
    
    if (gameState === 'MENU') drawMainMenu();
    else if (gameState === 'MODE_SELECT') drawModeSelect();
    else if (gameState === 'DIFFICULTY_SELECT') drawDifficultySelect();
    else if (gameState === 'SETTINGS_PANEL') drawSettingsPanel();
    else if (gameState === 'TOUR_CREATE') drawTournamentTeamSelect();
    else if (gameState === 'TOUR_BRACKET') drawTournamentBracket();
    else if (gameState === 'GAME') handleGameLogic();
    else if (gameState === 'TOUR_PODIUM') drawTournamentPodium();
    else if (gameState === 'CAMPAIGN_SELECT') drawCampaignSelect();
    else if (gameState === 'ONLINE_MENU') drawOnlineMenu();
    else if (gameState === 'ONLINE_LOBBY') drawOnlineLobby();
    
    if (gameState === 'TOUR_PODIUM') {
        if (random() < 0.15) {
            createCelebrationConfetti();
        }
    }

    if (gameState !== 'GAME') {
        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); if (particles[i].alpha <= 0) particles.splice(i, 1); else particles[i].display();
        }
    }

    if (showTutorialOverlay) drawTutorialModal();
    if (showScoreEntryModal) drawScoreEntryModal();
    if (showTourSettingsModal) drawTourSettingsModal();

    // --- SCREEN TRANSITION FADE EFFECT ---
    if (targetScreenFadeAlpha === 255) {
        screenFadeAlpha += 22; 
        if (screenFadeAlpha >= 255) {
            screenFadeAlpha = 255;
            if (pendingGameState) {
                gameState = pendingGameState;
                pendingGameState = null;
            }
            if (transitionCallback) {
                transitionCallback();
                transitionCallback = null;
            }
            targetScreenFadeAlpha = 0; 
        }
    } else if (targetScreenFadeAlpha === 0 && screenFadeAlpha > 0) {
        screenFadeAlpha -= 18; 
        if (screenFadeAlpha < 0) screenFadeAlpha = 0;
    }

    if (screenFadeAlpha > 0) {
        push();
        noStroke();
        fill(10, 10, 15, screenFadeAlpha); 
        rect(0, 0, width, height);
        pop();
    }

    pop();
}

}

function updateAndDrawMenuChips() {
    if (menuChips.length === 0) {
        let colors = ['#f85149', '#58a6ff', '#2ea043', '#d29922', '#bc8cff', '#ff7b72', '#ff79c6', '#f0f6fc'];
        for (let i = 0; i < 9; i++) {
            menuChips.push({
                p: createVector(random(50, width - 50), random(50, height - 50)),
                v: p5.Vector.random2D().mult(random(0.4, 1.2)),
                d: random(28, 42),
                color: colors[i % colors.length],
                rot: random(TWO_PI),
                rotV: random(-0.015, 0.015)
            });
        }
    }
    
    push();
    for (let chip of menuChips) {
        // Update physics
        chip.p.add(chip.v);
        chip.rot += chip.rotV;
        
        let r = chip.d / 2;
        // Perfect screen edge bouncing
        if (chip.p.x < r) { chip.p.x = r; chip.v.x *= -1; }
        if (chip.p.x > width - r) { chip.p.x = width - r; chip.v.x *= -1; }
        if (chip.p.y < r) { chip.p.y = r; chip.v.y *= -1; }
        if (chip.p.y > height - r) { chip.p.y = height - r; chip.v.y *= -1; }
        
        // Dynamic mouse interaction (magnetic repel field)
        let dMouse = dist(mouseX, mouseY, chip.p.x, chip.p.y);
        if (dMouse < 180) {
            let pushForce = map(dMouse, 0, 180, 0.28, 0);
            let dir = createVector(chip.p.x - mouseX, chip.p.y - mouseY).normalize();
            chip.v.add(dir.mult(pushForce));
            chip.v.limit(3.2); // Cap velocity for smooth motion
        }
        
        // Gentle drift friction to keep them peaceful
        chip.v.mult(0.98);
        if (chip.v.mag() < 0.2) {
            chip.v.add(p5.Vector.random2D().mult(0.08)); // Small random kick
        }
        
        // Chip-to-chip collisions
        for (let other of menuChips) {
            if (chip !== other) {
                let dChips = dist(chip.p.x, chip.p.y, other.p.x, other.p.y);
                let minDist = (chip.d + other.d) / 2;
                if (dChips < minDist) {
                    let overlap = minDist - dChips;
                    let norm = createVector(chip.p.x - other.p.x, chip.p.y - other.p.y).normalize();
                    chip.p.add(p5.Vector.mult(norm, overlap * 0.5));
                    other.p.sub(p5.Vector.mult(norm, overlap * 0.5));
                    
                    let k = p5.Vector.sub(chip.v, other.v).dot(norm);
                    if (k < 0) {
                        let impulse = norm.mult(k);
                        chip.v.sub(impulse);
                        other.v.add(impulse);
                    }
                }
            }
        }
        
        // Rendering chip visuals with glowing shadow
        noStroke();
        let glowCol = color(chip.color);
        glowCol.setAlpha(22);
        fill(glowCol);
        ellipse(chip.p.x, chip.p.y, chip.d * 1.6); // outer glow aura
        
        glowCol.setAlpha(50);
        fill(glowCol);
        ellipse(chip.p.x, chip.p.y, chip.d * 1.25); // inner glow aura
        
        fill(0, 45);
        ellipse(chip.p.x + 3, chip.p.y + 4, chip.d); // subtle soft shadow
        
        stroke(255, 140);
        strokeWeight(1.8);
        fill(chip.color);
        ellipse(chip.p.x, chip.p.y, chip.d); // primary body
        
        // Inner detail (Rotating Star Symbol)
        push();
        translate(chip.p.x, chip.p.y);
        rotate(chip.rot);
        fill(255, 200);
        noStroke();
        drawStar(0, 0, chip.d * 0.14, chip.d * 0.30, 5);
        pop();
    }
    pop();
}

function drawStyledButton(btn, label, isHover, accentColor = null) {
    push();
    let yOff = isHover ? -3 : 0;
    let shadowAlpha = isHover ? 35 : 12;
    
    // Elevating drop shadow
    noStroke();
    fill(0, shadowAlpha);
    rect(btn.x + 2, btn.y + (isHover ? 6 : 3), btn.w, btn.h, 10);
    
    // Background colors (smooth glassmorphism feel)
    let baseColor = isHover ? color('#21262d') : color('#161b22');
    if (accentColor) {
        let acc = color(accentColor);
        if (isHover) {
            baseColor = lerpColor(baseColor, acc, 0.22);
        }
    }
    fill(baseColor);
    
    // Modern sleek border
    let strokeCol = '#30363d';
    if (isHover) {
        strokeCol = accentColor ? accentColor : '#58a6ff';
    } else if (accentColor) {
        let acc = color(accentColor);
        acc.setAlpha(120);
        strokeCol = acc;
    }
    stroke(strokeCol);
    strokeWeight(isHover ? 1.8 : 1.2);
    
    rect(btn.x, btn.y + yOff, btn.w, btn.h, 10);
    
    // Label
    noStroke();
    fill(isHover ? '#ffffff' : '#c9d1d9');
    textAlign(CENTER, CENTER);
    textStyle(BOLD);
    textSize(13);
    
    let displayLabel = label;
    text(displayLabel, btn.x + btn.w/2, btn.y + yOff + btn.h/2);
    pop();
}

function formatTime(sec) {
    if (sec <= 0) return "0:00";
    if (sec < 10) {
        return sec.toFixed(1);
    }
    let m = floor(sec / 60);
    let s = floor(sec % 60);
    return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function completeMatchWithScore(s1, s2) {
    let currentRound = tourRounds[currentRoundIdx];
    let match = currentRound[currentMatchIdx];
    match.played = true;
    match.score1 = s1;
    match.score2 = s2;

    currentMatchIdx++;
    if (currentMatchIdx >= currentRound.length) {
        let isEndOfTournament = false;
        let finalMatch = currentRound.find(m => m.isFinal);
        
        if (finalMatch || currentRound.length === 1) {
            isEndOfTournament = true;
        }

        if (isEndOfTournament) {
            let actualFinal = finalMatch || currentRound[0];
            let firstPlaceTeam = (actualFinal.score1 > actualFinal.score2) ? actualFinal.t1 : actualFinal.t2;
            let secondPlaceTeam = (actualFinal.score1 > actualFinal.score2) ? actualFinal.t2 : actualFinal.t1;
            
            let thirdPlaceTeam = null;
            let thirdMatch = currentRound.find(m => m.isThirdPlace);
            if (thirdMatch) {
                thirdPlaceTeam = (thirdMatch.score1 > thirdMatch.score2) ? thirdMatch.t1 : thirdMatch.t2;
            }
            
            tourPodiumResults = {
                first: firstPlaceTeam,
                second: secondPlaceTeam,
                third: thirdPlaceTeam
            };
            
            gameState = 'TOUR_PODIUM';
            for (let i = 0; i < 80; i++) {
                createCelebrationConfetti();
            }
            entities = [];
        } else if (currentRound.length === 2) {
            let l1 = (currentRound[0].score1 > currentRound[0].score2) ? currentRound[0].t2 : currentRound[0].t1;
            let l2 = (currentRound[1].score1 > currentRound[1].score2) ? currentRound[1].t2 : currentRound[1].t1;
            let w1 = (currentRound[0].score1 > currentRound[0].score2) ? currentRound[0].t1 : currentRound[0].t2;
            let w2 = (currentRound[1].score1 > currentRound[1].score2) ? currentRound[1].t1 : currentRound[1].t2;
            
            let nextRoundMatches = [];
            nextRoundMatches.push({ t1: l1, t2: l2, score1: 0, score2: 0, played: false, isThirdPlace: true });
            nextRoundMatches.push({ t1: w1, t2: w2, score1: 0, score2: 0, played: false, isFinal: true });
            
            tourRounds.push(nextRoundMatches);
            currentRoundIdx++;
            currentMatchIdx = 0;
            viewRoundIdx = currentRoundIdx;
            gameState = 'TOUR_BRACKET';
        } else {
            let nextRoundMatches = [];
            for (let i = 0; i < currentRound.length; i += 2) {
                let w1 = (currentRound[i].score1 > currentRound[i].score2) ? currentRound[i].t1 : currentRound[i].t2;
                let w2 = (currentRound[i+1].score1 > currentRound[i+1].score2) ? currentRound[i+1].t1 : currentRound[i+1].t2;
                nextRoundMatches.push({ t1: w1, t2: w2, score1: 0, score2: 0, played: false });
            }
            tourRounds.push(nextRoundMatches);
            currentRoundIdx++;
            currentMatchIdx = 0;
            viewRoundIdx = currentRoundIdx;
            gameState = 'TOUR_BRACKET';
        }
    } else {
        gameState = 'TOUR_BRACKET';
    }
}

function getRoundName(round) {
    if (round.some(m => m.isFinal || m.isThirdPlace)) return "ФИНАЛЬНЫЕ МАТЧИ";
    let len = round.length;
    if (len === 16) return "1/16 ФИНАЛА";
    if (len === 8) return "1/8 ФИНАЛА";
    if (len === 4) return "1/4 ФИНАЛА";
    if (len === 2) return "ПОЛУФИНАЛ";
    if (len === 1) return "ФИНАЛ";
    return "РАУНД";
}

function drawTournamentBracket() {
    drawModernBackground();
    textFont('system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif');

    let cardW = min(width * 0.95, 340);
    let cardH = height * 0.96;
    let cx = width/2 - cardW/2;
    let cy = height * 0.02;

    drawGlassCard(cx, cy, cardW, cardH, "СЕТКА ЧЕМПИОНАТА", "ТУРНИРНАЯ ТАБЛИЦА");

    let currentRound = tourRounds[viewRoundIdx];
    let rName = getRoundName(currentRound);
    let rSub = (viewRoundIdx === currentRoundIdx) ? `МАТЧ ${currentMatchIdx + 1} ИЗ ${currentRound.length}` : "РАУНД ЗАВЕРШЕН";

    // Navigation Arrows inside the header area
    let hasPrev = (viewRoundIdx > 0);
    let hasNext = (viewRoundIdx < tourRounds.length - 1);
    
    // Prev Arrow
    let hPrev = (hasPrev && mouseX > cx + 15 && mouseX < cx + 55 && mouseY > cy + 45 && mouseY < cy + 85);
    push();
    textAlign(CENTER, CENTER);
    textSize(18); textStyle(BOLD);
    fill(hasPrev ? (hPrev ? '#ffffff' : '#58a6ff') : '#484f58');
    text("<", cx + 35, cy + 62);
    pop();
    
    // Next Arrow
    let hNext = (hasNext && mouseX > cx + cardW - 55 && mouseX < cx + cardW - 15 && mouseY > cy + 45 && mouseY < cy + 85);
    push();
    textAlign(CENTER, CENTER);
    textSize(18); textStyle(BOLD);
    fill(hasNext ? (hNext ? '#ffffff' : '#58a6ff') : '#484f58');
    text(">", cx + cardW - 35, cy + 62);
    pop();

    // Stage Title
    push();
    textAlign(CENTER, CENTER);
    fill('#58a6ff'); textSize(13); textStyle(BOLD);
    text(rName, width/2, cy + 54);
    fill('#8b949e'); textSize(10); textStyle(NORMAL);
    text(rSub, width/2, cy + 70);
    pop();

    let startY = cy + 85;
    let bracketCardW = cardW - 30;
    let hasSpecialMatches = currentRound.some(m => m.isThirdPlace || m.isFinal);
    let bracketCardH = hasSpecialMatches ? 58 : (currentRound.length > 4 ? 36 : 48); 
    let spacing = hasSpecialMatches ? 12 : (currentRound.length > 4 ? 6 : 10);

    // Constraint scrolling bounds
    let totalHeight = currentRound.length * (bracketCardH + spacing) - spacing;
    let visibleHeight = (cy + cardH - 125) - startY;
    let maxScroll = totalHeight > visibleHeight ? totalHeight - visibleHeight : 0;
    tourScrollY = constrain(tourScrollY, -maxScroll, 0);

    // Clipping content with HTML5 Canvas drawingContext
    drawingContext.save();
    drawingContext.beginPath();
    drawingContext.rect(cx + 10, startY - 2, cardW - 20, visibleHeight + 4);
    drawingContext.clip();

    for (let i = 0; i < currentRound.length; i++) {
        let m = currentRound[i];
        let bcx = width/2 - bracketCardW/2;
        let bcy = startY + tourScrollY + i * (bracketCardH + spacing);
        
        let isCurrent = (viewRoundIdx === currentRoundIdx && i === currentMatchIdx);
        
        let labelText = "";
        if (m.isThirdPlace) labelText = "МАТЧ ЗА 3-Е МЕСТО 🥉";
        else if (m.isFinal) labelText = "ФИНАЛ 🥇";
        
        push();
        if (isCurrent) {
            fill('#1f242c');
            if (m.isFinal) {
                stroke('#d29922');
                strokeWeight(2.0);
            } else if (m.isThirdPlace) {
                stroke('#bc8cff');
                strokeWeight(1.8);
            } else {
                stroke('#58a6ff');
                strokeWeight(1.5);
            }
        } else {
            fill('#161b22');
            if (m.isFinal) {
                stroke('rgba(210, 153, 34, 0.4)');
                strokeWeight(1.2);
            } else if (m.isThirdPlace) {
                stroke('rgba(188, 140, 255, 0.4)');
                strokeWeight(1.2);
            } else {
                stroke('#30363d');
                strokeWeight(1);
            }
        }
        rect(bcx, bcy, bracketCardW, bracketCardH, 6);
        pop();

        if (labelText) {
            push();
            textAlign(LEFT, TOP);
            textSize(9);
            textStyle(BOLD);
            if (m.isFinal) {
                fill('#d29922');
            } else {
                fill('#bc8cff');
            }
            text(labelText, bcx + 12, bcy + 6);
            pop();
        }

        let t1Y = bcy + (labelText ? bracketCardH * 0.42 : bracketCardH * 0.28);
        let t2Y = bcy + (labelText ? bracketCardH * 0.78 : bracketCardH * 0.72);

        push();
        noStroke(); 
        fill(m.played && m.score1 > m.score2 ? '#ffffff' : '#8b949e'); 
        textAlign(LEFT, CENTER); 
        textStyle(m.played && m.score1 > m.score2 ? BOLD : NORMAL);
        textSize(bracketCardH < 40 ? 10 : 11); 
        text(m.t1.name, bcx + 26, t1Y);
        fill(m.t1.color); ellipse(bcx + 14, t1Y, 7);

        fill(m.played && m.score2 > m.score1 ? '#ffffff' : '#8b949e'); 
        textStyle(m.played && m.score2 > m.score1 ? BOLD : NORMAL);
        text(m.t2.name, bcx + 26, t2Y);
        fill(m.t2.color); ellipse(bcx + 14, t2Y, 7);

        textAlign(RIGHT, CENTER); textSize(bracketCardH < 40 ? 11 : 13);
        if (m.played) {
            fill('#58a6ff'); textStyle(BOLD);
            text(m.score1, bcx + bracketCardW - 12, t1Y);
            text(m.score2, bcx + bracketCardW - 12, t2Y);
        } else {
            fill('#484f58'); textStyle(NORMAL); textSize(bracketCardH < 40 ? 8 : 10);
            text("ОЖИДАНИЕ", bcx + bracketCardW - 12, bcy + bracketCardH/2 + (labelText ? 6 : 0));
        }
        pop();
    }
    drawingContext.restore();

    // Footer buttons inside glass card bounds
    if (viewRoundIdx === currentRoundIdx) {
        let footerY = cy + cardH - 110;
        
        tourStartMatchBtn = { x: cx + 20, y: footerY, w: cardW - 40, h: 32 };
        tourManualScoreBtn = { x: cx + 20, y: footerY + 38, w: (cardW - 50)/2, h: 28 };
        tourSimBtn = { x: cx + 20 + (cardW - 50)/2 + 10, y: footerY + 38, w: (cardW - 50)/2, h: 28 };
        tourBackMenuBtn = { x: cx + 20, y: cy + cardH - 36, w: cardW - 40, h: 26 };

        let hStart = mouseX > tourStartMatchBtn.x && mouseX < tourStartMatchBtn.x + tourStartMatchBtn.w && mouseY > tourStartMatchBtn.y && mouseY < tourStartMatchBtn.y + tourStartMatchBtn.h;
        drawStyledButton(tourStartMatchBtn, "ИГРАТЬ МАТЧ", hStart, '#2ea043');

        let hManual = mouseX > tourManualScoreBtn.x && mouseX < tourManualScoreBtn.x + tourManualScoreBtn.w && mouseY > tourManualScoreBtn.y && mouseY < tourManualScoreBtn.y + tourManualScoreBtn.h;
        drawStyledButton(tourManualScoreBtn, "БЫСТРЫЙ СЧЕТ", hManual, '#58a6ff');

        let hSim = mouseX > tourSimBtn.x && mouseX < tourSimBtn.x + tourSimBtn.w && mouseY > tourSimBtn.y && mouseY < tourSimBtn.y + tourSimBtn.h;
        drawStyledButton(tourSimBtn, "СИМУЛЯЦИЯ", hSim, '#bc8cff');
    } else {
        let footerY = cy + cardH - 72;
        
        tourStartMatchBtn = { x: cx + 20, y: footerY, w: cardW - 40, h: 32 };
        tourBackMenuBtn = { x: cx + 20, y: cy + cardH - 36, w: cardW - 40, h: 26 };

        let hJump = mouseX > tourStartMatchBtn.x && mouseX < tourStartMatchBtn.x + tourStartMatchBtn.w && mouseY > tourStartMatchBtn.y && mouseY < tourStartMatchBtn.y + tourStartMatchBtn.h;
        drawStyledButton(tourStartMatchBtn, "К ТЕКУЩЕМУ РАУНДУ", hJump, '#d29922');
    }

    let hBack = mouseX > tourBackMenuBtn.x && mouseX < tourBackMenuBtn.x + tourBackMenuBtn.w && mouseY > tourBackMenuBtn.y && mouseY < tourBackMenuBtn.y + tourBackMenuBtn.h;
    drawStyledButton(tourBackMenuBtn, "ПОКИНУТЬ ТУРНИР", hBack, '#f85149');
}

function initDynamicTournament(teamCount) {
    isTournament = true;
    isCampaign = false;
    maxGoalsToWin = tourGoalsLimit;
    currentRoundIdx = 0;
    currentMatchIdx = 0;
    viewRoundIdx = 0;
    tourScrollY = 0;
    tourRounds = [];

    // Filter only selected teams
    let chosenTeams = [];
    for (let i = 0; i < TOURNAMENT_PRESET_TEAMS.length; i++) {
        if (selectedTourTeams[i]) {
            chosenTeams.push(TOURNAMENT_PRESET_TEAMS[i]);
        }
    }

    let shuffled = shuffle([...chosenTeams]);
    tourTeams = shuffled;

    let firstRoundMatches = [];
    for (let i = 0; i < teamCount; i += 2) {
        firstRoundMatches.push({
            t1: tourTeams[i],
            t2: tourTeams[i+1],
            score1: 0,
            score2: 0,
            played: false
        });
    }
    tourRounds.push(firstRoundMatches);
    gameState = 'TOUR_BRACKET';
}

function initTournament(teamCount) {
    isTournament = true;
    isCampaign = false;
    currentRoundIdx = 0;
    currentMatchIdx = 0;
    tourRounds = [];

    let shuffled = shuffle([...TOURNAMENT_PRESET_TEAMS]);
    tourTeams = shuffled.slice(0, teamCount);

    for (let i = 0; i < teamCount; i += 2) {
        firstRoundMatches.push({
            t1: tourTeams[i],
            t2: tourTeams[i+1],
            score1: 0,
            score2: 0,
            played: false
        });
    }
    tourRounds.push(firstRoundMatches);
    gameState = 'TOUR_BRACKET';
}

function handleGameLogic() {
    orbitAngle += 0.04; 

    if (globalSpawnAlpha < 255) {
        globalSpawnAlpha += 5.5; if (globalSpawnAlpha > 255) globalSpawnAlpha = 255;
    }

    if (isGoalCelebrating) {
        goalCelebrationTimer--;
        if (goalCelebrationTimer <= 0) {
            isGoalCelebrating = false;
            if (isVsBot && !isCampaign && !isTournament && TACTICS[p2TacticIdx] !== 'СВОЯ') p2TacticIdx = floor(random(0, 4));
            animateFieldToTactic(pendingNextTurnTeam); 
        }
    }

    if (isResettingPositions || isEvacuating) {
        let arrivedCount = 0;
        for (let i = 0; i < entities.length; i++) {
            let targetPos = targetPositions[i];
            if (targetPos) {
                entities[i].p.x = lerp(entities[i].p.x, targetPos.x, 0.08); 
                entities[i].p.y = lerp(entities[i].p.y, targetPos.y, 0.08);
                if (dist(entities[i].p.x, entities[i].p.y, targetPos.x, targetPos.y) < 0.5) { 
                    entities[i].p.set(targetPos); arrivedCount++; 
                }
            } else { arrivedCount++; }
        }
        if (arrivedCount === entities.length) { isResettingPositions = false; isEvacuating = false; }
    }

    let moving = false;
    for (let e of entities) { if (e.v.mag() > 0.05) moving = true; }
    
    if (isCampaign) {
        if (moving) {
            campaignRollingFrameCounter++;
        } else {
            campaignRollingFrameCounter = 0;
        }
    } else {
        campaignRollingFrameCounter = 0;
    }
    
    // Shot Clock and Stalling tracking
    if (isTournament && !matchWinner && !isGoalCelebrating && !isResettingPositions && !isEvacuating && !isEditingTactic && gameState === 'GAME') {
        if (moving) {
            turnShotClock = 15;
            currentTurnIdleTime = 0;
        } else {
            let elapsedSec = deltaTime / 1000;
            currentTurnIdleTime += elapsedSec;
            turnShotClock -= elapsedSec;
            
            if (turnShotClock <= 0) {
                turnShotClock = 15;
                currentTurnIdleTime = 0;
                playSound('over', 0.85);
                currentTurn = (currentTurn === PLAYER1_COLOR) ? PLAYER2_COLOR : PLAYER1_COLOR;
                turnSwitchedThisRoll = true;
                disputedOverlayText = "ХОД ПЕРЕДАН!";
                disputedTextTimer = 110;
                shakeAmount = 4;
            }
        }
    } else {
        turnShotClock = 15;
        currentTurnIdleTime = 0;
    }
    
    if (isTournament && tourTimeLimitMinutes > 0 && !matchWinner && !isGoalCelebrating && !isResettingPositions && !isEvacuating && !isEditingTactic && gameState === 'GAME') {
        if (!moving) {
            let elapsedSec = deltaTime / 1000;
            if (currentTurn === PLAYER1_COLOR) {
                p1TimeRemaining -= elapsedSec;
                if (p1TimeRemaining <= 0) {
                    p1TimeRemaining = 0;
                    playSound('over', 0.9);
                    p2Goals = maxGoalsToWin;
                    let curM = tourRounds[currentRoundIdx][currentMatchIdx];
                    let winnerName = curM ? curM.t2.name : 'СИНИЕ';
                    triggerWin(winnerName);
                }
            } else {
                p2TimeRemaining -= elapsedSec;
                if (p2TimeRemaining <= 0) {
                    p2TimeRemaining = 0;
                    playSound('over', 0.9);
                    p1Goals = maxGoalsToWin;
                    let curM = tourRounds[currentRoundIdx][currentMatchIdx];
                    let winnerName = curM ? curM.t1.name : 'КРАСНЫЕ';
                    triggerWin(winnerName);
                }
            }
        }
    }
    
    if (isTournament && tourMatchDurationMinutes > 0 && matchTimeRemaining > 0 && !isGoldenGoalActive && !matchWinner && !isGoalCelebrating && !isResettingPositions && !isEvacuating && !isEditingTactic && gameState === 'GAME') {
        let elapsedSec = deltaTime / 1000;
        // Pause the match timer if the current turn has been idle for more than 6.0 seconds to prevent stalling
        if (currentTurnIdleTime <= 6.0) {
            matchTimeRemaining -= elapsedSec;
        }
        if (matchTimeRemaining <= 0) {
            matchTimeRemaining = 0;
            if (p1Goals !== p2Goals) {
                let curM = tourRounds[currentRoundIdx][currentMatchIdx];
                let winnerName;
                if (p1Goals > p2Goals) {
                    winnerName = curM ? curM.t1.name : 'КРАСНЫЕ';
                } else {
                    winnerName = curM ? curM.t2.name : 'СИНИЕ';
                }
                playSound('over', 0.9);
                triggerWin(winnerName);
            } else {
                isGoldenGoalActive = true;
                playSound('over', 0.9);
                disputedOverlayText = "ЗОЛОТОЙ ГОЛ!";
                disputedTextTimer = 180;
                shakeAmount = 8;
            }
        }
    }
    
    if (moving || isResettingPositions || isEvacuating || matchWinner || isEditingTactic || isGoalCelebrating) {
        orbitAlpha = lerp(orbitAlpha, 0, 0.15); 
    } else {
        orbitAlpha = lerp(orbitAlpha, 255, 0.08); 
    }

    if (!moving && !isResettingPositions && !isEvacuating && turnSwitchedThisRoll && !matchWinner && !isEditingTactic && !isGoalCelebrating) {
        triggerSmoothEvacuation();
        turnSwitchedThisRoll = false; 
        if (isOnline && socket && myShotPendingResolve) {
            myShotPendingResolve = false;
            socket.emit('sync', {
                room: onlineRoomId,
                positions: entities.map(e => ({ x: e.p.x, y: e.p.y }))
            });
        }
        if (isKickOffActive) {
            isKickOffActive = false;
            createShieldDeactivationSparkles();
        }
        
        if (isBallInCorner()) {
            cornerTurns++;
            if (cornerTurns >= 3) {
                triggerDropBall();
            }
        } else {
            cornerTurns = 0;
        }
    }

    if (matchWinner) {
        let winColor = (p1Goals > p2Goals) ? PLAYER1_COLOR : PLAYER2_COLOR;
        animatedBgColor = color(winColor); 
    } else if (isGoalCelebrating && goalScoringTeamColor) {
        let targetGoalBg = (goalScoringTeamColor === PLAYER1_COLOR) ? color('#3a1515') : color('#15363a');
        animatedBgColor = lerpColor(animatedBgColor, targetGoalBg, 0.15);
    } else if (isEditingTactic) {
        animatedBgColor = color('#1e2528'); 
    } else if (moving || isResettingPositions || isEvacuating) {
        animatedBgColor = lerpColor(animatedBgColor, color(ORIGINAL_BG), 0.04);
    } else {
        let turnBg = (currentTurn === PLAYER1_COLOR) ? color(BG_P1) : color(BG_P2);
        animatedBgColor = lerpColor(animatedBgColor, turnBg, 0.04);
    }
    
    background(animatedBgColor);

    if (!matchWinner && !isGoalCelebrating) {
        targetFieldScale = 1.0;
    }
    fieldScale = lerp(fieldScale, targetFieldScale, 0.08);

    push();
    translate(width / 2, height / 2); scale(fieldScale); translate(-width / 2, -height / 2);

    drawVisualLayout(); 
    drawModifiers(); 
    if (isCampaign && !isEditingTactic) {
        updateAndDrawMines();
        updateAndDrawPortals();
        updateAndDrawVortices();
    } 
    if (!isEditingTactic && !matchWinner && !isGoalCelebrating) drawCornerIndicators();
    drawBallTrail(); 
    if (!isResettingPositions && !isEvacuating && !isEditingTactic && !matchWinner && !isGoalCelebrating) checkCollisions();

    if (isVsBot && currentTurn === PLAYER2_COLOR && !moving && !isResettingPositions && !isEvacuating && !matchWinner && !isEditingTactic && !isGoalCelebrating) {
        aiTimer++; if (aiTimer > 75) { executeBotTurn(); aiTimer = 0; }
    }

    if (selectedChip && mouseIsPressed && !isEditingTactic && !matchWinner && !isGoalCelebrating) { targetAimAlpha = 50; lastSelectedChipPos = selectedChip.p.copy(); } 
    else { targetAimAlpha = 0; }
    aimAlpha = lerp(aimAlpha, targetAimAlpha, 0.12); 
    if (aimAlpha > 0.5 && lastSelectedChipPos) drawOriginalPull(lastSelectedChipPos);

    for (let e of entities) { 
        if (!isEditingTactic && !isResettingPositions && !isEvacuating && !matchWinner && !isGoalCelebrating) e.update(); 
        if (e.checkGoal()) { pop(); return; } 
        e.display(moving); 
    }
    
    for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); if (particles[i].alpha <= 0) particles.splice(i, 1); else particles[i].display();
    }
    
    if (isEditingTactic) { drawSaveButtonsOverlay(); } else { drawFieldScore(); }
    pop(); 

    if (isCampaign && gameState === 'GAME' && !matchWinner) {
        push(); textAlign(LEFT, TOP); fill(255, 170); textSize(14); textStyle(BOLD);
        text(`УРОВЕНЬ: ${CAMPAIGN_LEVELS[currentLevel].name} ⏩`, fieldX + 10, fieldY - goalH - 25);
        pop();
    }
    else if (isTournament && gameState === 'GAME' && !matchWinner) {
        push(); textAlign(CENTER, TOP); fill(255, 170); textSize(12); textStyle(BOLD);
        let curM = tourRounds[currentRoundIdx][currentMatchIdx];
        text(`${curM.t1.name} VS ${curM.t2.name}`, width/2, fieldY - goalH - 25);
        pop();
    }

    if (matchWinner) {
        drawWinOverlay(); 
        goalTextTimer--; 
        if (goalTextTimer === 0) {
            let savedWinner = matchWinner;
            changeStateWithFade(null, () => {
                handleMatchEnd(savedWinner);
            });
        }
    } else if (isGoalCelebrating && goalTextTimer > 0) {
        drawGoalOverlay(); goalTextTimer--; 
    }

    if (disputedTextTimer > 0) {
        drawDisputedOverlay();
        disputedTextTimer--;
    }
}

                let w1 = (currentRound[0].score1 > currentRound[0].score2) ? currentRound[0].t1 : currentRound[0].t2;
                let w2 = (currentRound[1].score1 > currentRound[1].score2) ? currentRound[1].t1 : currentRound[1].t2;

                nextRoundMatches.push({ t1: l1, t2: l2, score1: 0, score2: 0, played: false, isThirdPlace: true });
                nextRoundMatches.push({ t1: w1, t2: w2, score1: 0, score2: 0, played: false, isFinal: true });

                    let w2 = (currentRound[i+1].score1 > currentRound[i+1].score2) ? currentRound[i+1].t1 : currentRound[i+1].t2;
                    nextRoundMatches.push({ t1: w1, t2: w2, score1: 0, score2: 0, played: false });

function executeBotTurn() {
    let botChips = []; let ball = null;
    for (let e of entities) { if (e.isBall) ball = e; else if (e.color === PLAYER2_COLOR) botChips.push(e); }
    if (!ball || botChips.length === 0) return;
    let chosenChip = botChips[0]; let targetGate = createVector(fieldX + fieldW/2, fieldY + fieldH); 

    if (botDifficulty === 'ЛЕГКО') {
        chosenChip = random(botChips); let pushVec = p5.Vector.sub(ball.p, chosenChip.p);
        pushVec.add(p5.Vector.random2D().mult(random(30, 80))); pushVec.normalize().mult(random(6, 12)); chosenChip.v.set(pushVec);
    } 
    else if (botDifficulty === 'СРЕДНЕ') {
        let minDist = 9999;
        for (let c of botChips) { let d = dist(c.p.x, c.p.y, ball.p.x, ball.p.y); if (d < minDist) { minDist = d; chosenChip = c; } }
        let pushVec = p5.Vector.sub(ball.p, chosenChip.p); pushVec.add(p5.Vector.random2D().mult(random(5, 18))); pushVec.normalize().mult(14); chosenChip.v.set(pushVec);
    } 
    else if (botDifficulty === 'СЛОЖНО') {
        let bestScore = -9999;
        for (let c of botChips) {
            let toBall = p5.Vector.sub(ball.p, c.p); let toGate = p5.Vector.sub(targetGate, ball.p);
            let alignment = toBall.normalize().dot(toGate.normalize()); if (alignment > bestScore) { bestScore = alignment; chosenChip = c; }
        }
        let pushVec = p5.Vector.sub(ball.p, chosenChip.p); pushVec.normalize().mult(17); chosenChip.v.set(pushVec);
    }
    else if (botDifficulty === 'ЭКСТРЕМАЛЬНО') {
        let bestShot = null;
        let bestScore = -99999;

        // Target points along the opponent's goal line (bottom)
        let goalLeftX = fieldX + fieldW/2 - goalW/2 + 8;
        let goalRightX = fieldX + fieldW/2 + goalW/2 - 8;
        let targets = [];
        for (let i = 0; i < 5; i++) {
            let tx = lerp(goalLeftX, goalRightX, i / 4);
            targets.push(createVector(tx, fieldY + fieldH));
        }

        // Helper to check distance to segment
        let distToSeg = (p, v, w) => {
            let dx = w.x - v.x;
            let dy = w.y - v.y;
            let l2 = dx*dx + dy*dy;
            if (l2 === 0) return dist(p.x, p.y, v.x, v.y);
            let t = ((p.x - v.x) * dx + (p.y - v.y) * dy) / l2;
            t = constrain(t, 0, 1);
            return dist(p.x, p.y, v.x + t * dx, v.y + t * dy);
        };

        // Scan all bot chips
        for (let c of botChips) {
            for (let T of targets) {
                // 1. Direct shot
                {
                    let desiredBallDir = p5.Vector.sub(T, ball.p).normalize();
                    let impactPoint = p5.Vector.sub(ball.p, p5.Vector.mult(desiredBallDir, (ball.d/2 + c.d/2)));
                    let shootVec = p5.Vector.sub(impactPoint, c.p);
                    let dToImpact = shootVec.mag();
                    let alignment = (dToImpact > 0.1) ? shootVec.copy().normalize().dot(desiredBallDir) : 1.0;

                    if (alignment > 0.3) {
                        let score = alignment * 1200 - dToImpact * 0.8;
                        
                        // Check if ball path is blocked
                        let blocked = false;
                        for (let e of entities) {
                            if (e !== ball && e !== c) {
                                if (distToSeg(e.p, ball.p, T) < (e.d + ball.d)/2) {
                                    blocked = true;
                                }
                            }
                        }
                        if (blocked) score -= 600;

                        if (score > bestScore) {
                            bestScore = score;
                            bestShot = { chip: c, forceVec: p5.Vector.sub(impactPoint, c.p).normalize().mult(19.5) };
                        }
                    }
                }

                // 2. Left wall rebound shot
                {
                    let wallX = fieldX + boundarySize;
                    let T_mirrored = createVector(2 * wallX - T.x, T.y);
                    let denom = T_mirrored.x - ball.p.x;
                    if (abs(denom) > 1) {
                        let t = (wallX - ball.p.x) / denom;
                        let bounceY = ball.p.y + t * (T_mirrored.y - ball.p.y);
                        if (bounceY >= fieldY && bounceY <= fieldY + fieldH) {
                            let B = createVector(wallX, bounceY);
                            let desiredBallDir = p5.Vector.sub(B, ball.p).normalize();
                            let impactPoint = p5.Vector.sub(ball.p, p5.Vector.mult(desiredBallDir, (ball.d/2 + c.d/2)));
                            let shootVec = p5.Vector.sub(impactPoint, c.p);
                            let dToImpact = shootVec.mag();
                            let alignment = (dToImpact > 0.1) ? shootVec.copy().normalize().dot(desiredBallDir) : 1.0;

                            if (alignment > 0.4) {
                                let score = alignment * 1000 - dToImpact * 1.0;
                                
                                // Check blocking
                                let blocked = false;
                                for (let e of entities) {
                                    if (e !== ball && e !== c) {
                                        if (distToSeg(e.p, ball.p, B) < (e.d + ball.d)/2 || distToSeg(e.p, B, T) < (e.d + ball.d)/2) {
                                            blocked = true;
                                        }
                                    }
                                }
                                if (blocked) score -= 500;

                                if (score > bestScore) {
                                    bestScore = score;
                                    bestShot = { chip: c, forceVec: p5.Vector.sub(impactPoint, c.p).normalize().mult(19.5) };
                                }
                            }
                        }
                    }
                }

                // 3. Right wall rebound shot
                {
                    let wallX = fieldX + fieldW - boundarySize;
                    let T_mirrored = createVector(2 * wallX - T.x, T.y);
                    let denom = T_mirrored.x - ball.p.x;
                    if (abs(denom) > 1) {
                        let t = (wallX - ball.p.x) / denom;
                        let bounceY = ball.p.y + t * (T_mirrored.y - ball.p.y);
                        if (bounceY >= fieldY && bounceY <= fieldY + fieldH) {
                            let B = createVector(wallX, bounceY);
                            let desiredBallDir = p5.Vector.sub(B, ball.p).normalize();
                            let impactPoint = p5.Vector.sub(ball.p, p5.Vector.mult(desiredBallDir, (ball.d/2 + c.d/2)));
                            let shootVec = p5.Vector.sub(impactPoint, c.p);
                            let dToImpact = shootVec.mag();
                            let alignment = (dToImpact > 0.1) ? shootVec.copy().normalize().dot(desiredBallDir) : 1.0;

                            if (alignment > 0.4) {
                                let score = alignment * 1000 - dToImpact * 1.0;
                                
                                // Check blocking
                                let blocked = false;
                                for (let e of entities) {
                                    if (e !== ball && e !== c) {
                                        if (distToSeg(e.p, ball.p, B) < (e.d + ball.d)/2 || distToSeg(e.p, B, T) < (e.d + ball.d)/2) {
                                            blocked = true;
                                        }
                                    }
                                }
                                if (blocked) score -= 500;

                                if (score > bestScore) {
                                    bestScore = score;
                                    bestShot = { chip: c, forceVec: p5.Vector.sub(impactPoint, c.p).normalize().mult(19.5) };
                                }
                            }
                        }
                    }
                }
            }
        }

        if (bestShot) {
            chosenChip = bestShot.chip;
            chosenChip.v.set(bestShot.forceVec);
        } else {
            // Fallback to СЛОЖНО
            let bestAlign = -9999;
            for (let c of botChips) {
                let toBall = p5.Vector.sub(ball.p, c.p); let toGate = p5.Vector.sub(targetGate, ball.p);
                let alignment = toBall.normalize().dot(toGate.normalize()); if (alignment > bestAlign) { bestAlign = alignment; chosenChip = c; }
            }
            let pushVec = p5.Vector.sub(ball.p, chosenChip.p); pushVec.normalize().mult(18); chosenChip.v.set(pushVec);
        }
    }
    // ИСПРАВЛЕНИЕ: Убран playSound('hit'), бот запускает фишку молча
    currentTurn = PLAYER1_COLOR; turnSwitchedThisRoll = true; 
}

function triggerSmoothEvacuation() {
    let penaltyH = fieldH * 0.11; let goalLeftX = (fieldX + fieldW/2) - goalW/2; let goalRightX = (fieldX + fieldW/2) + goalW/2;
    targetPositions = []; let needsEvac = false;
    for (let i = 0; i < entities.length; i++) {
        let e = entities[i]; targetPositions.push(e.p.copy());
        if (!e.isBall) {
            let r = e.d / 2;
            if (e.p.x > goalLeftX - 2 && e.p.x < goalRightX + 2) {
                if (e.p.y < fieldY + 2) {
                    let flankX = (e.p.x < fieldX + fieldW/2) ? (fieldX + fieldW/2 - goalW*0.65) : (fieldX + fieldW/2 + goalW*0.65);
                    let targetY = fieldY + penaltyH + r + 6;
                    
                    let attempt = 0;
                    let finalX = flankX;
                    let finalY = targetY;
                    let occupied = true;
                    while (occupied && attempt < 10) {
                        occupied = false;
                        for (let j = 0; j < i; j++) {
                            if (!entities[j].isBall && dist(finalX, finalY, targetPositions[j].x, targetPositions[j].y) < e.d + 5) {
                                occupied = true;
                                break;
                            }
                        }
                        if (occupied) {
                            finalX += random(-25, 25);
                            finalY += random(15, 30);
                            attempt++;
                        }
                    }
                    targetPositions[i].set(finalX, finalY); e.v.set(0, 0); needsEvac = true;
                }
                if (e.p.y > fieldY + fieldH - 2) {
                    let flankX = (e.p.x < fieldX + fieldW/2) ? (fieldX + fieldW/2 - goalW*0.65) : (fieldX + fieldW/2 + goalW*0.65);
                    let targetY = fieldY + fieldH - penaltyH - r - 6;
                    
                    let attempt = 0;
                    let finalX = flankX;
                    let finalY = targetY;
                    let occupied = true;
                    while (occupied && attempt < 10) {
                        occupied = false;
                        for (let j = 0; j < i; j++) {
                            if (!entities[j].isBall && dist(finalX, finalY, targetPositions[j].x, targetPositions[j].y) < e.d + 5) {
                                occupied = true;
                                break;
                            }
                        }
                        if (occupied) {
                            finalX += random(-25, 25);
                            finalY -= random(15, 30);
                            attempt++;
                        }
                    }
                    targetPositions[i].set(finalX, finalY); e.v.set(0, 0); needsEvac = true;
                }
            }
        }
    }
    if (needsEvac) isEvacuating = true;
}
