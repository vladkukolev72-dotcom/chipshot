let campaignMines = [];
let campaignPortals = [];
let campaignVortices = [];

function initCampaignObstacles(lvl) {
    campaignMines = [];
    campaignPortals = [];
    campaignVortices = [];

    if (!lvl) return;
    
    let midX = fieldX + fieldW / 2;
    let midY = fieldY + fieldH / 2;

    if (lvl.scenario === 'mines' || lvl.scenario === 'chaos_arena' || lvl.scenario === 'royale') {
        let isMinesLevelOnly = (lvl.scenario === 'mines');
        if (isMinesLevelOnly) {
            // Spawn 4 mines in symmetrical layout for the pure Mines level
            campaignMines.push({ x: midX - fieldW * 0.22, y: midY - fieldH * 0.16, size: 24, triggered: false, triggerCooldown: 0, pulse: 0 });
            campaignMines.push({ x: midX + fieldW * 0.22, y: midY - fieldH * 0.16, size: 24, triggered: false, triggerCooldown: 0, pulse: PI/2 });
            campaignMines.push({ x: midX - fieldW * 0.22, y: midY + fieldH * 0.16, size: 24, triggered: false, triggerCooldown: 0, pulse: PI });
            campaignMines.push({ x: midX + fieldW * 0.22, y: midY + fieldH * 0.16, size: 24, triggered: false, triggerCooldown: 0, pulse: 3*PI/2 });
        } else {
            // Nerfed to 2 mines for Chaos and Royale, placed safely on left/right outer boundaries to not disrupt kickoff
            campaignMines.push({ x: fieldX + 38, y: midY - fieldH * 0.12, size: 22, triggered: false, triggerCooldown: 0, pulse: 0 });
            campaignMines.push({ x: fieldX + fieldW - 38, y: midY + fieldH * 0.12, size: 22, triggered: false, triggerCooldown: 0, pulse: PI });
        }
    }

    if (lvl.scenario === 'vortex' || lvl.scenario === 'royale') {
        // Gravitational Vortex in the center of the pitch - nerfed pull strength to keep playability high
        let str = (lvl.scenario === 'royale') ? 0.05 : 0.08;
        campaignVortices.push({ x: midX, y: midY, radius: 100, pullStrength: str, pulse: 0 });
    }

    if (lvl.scenario === 'portals' || lvl.scenario === 'royale') {
        // Portals linking left <-> right sides of the pitch
        campaignPortals.push({
            id: 1,
            x: fieldX + 45,
            y: midY,
            targetX: fieldX + fieldW - 45,
            targetY: midY,
            size: 32,
            color: '#d500f9',
            cooldowns: new Map()
        });
        campaignPortals.push({
            id: 2,
            x: fieldX + fieldW - 45,
            y: midY,
            targetX: fieldX + 45,
            targetY: midY,
            size: 32,
            color: '#00e5ff',
            cooldowns: new Map()
        });
    }
}

function updateAndDrawMines() {
    let mineCol = '#ff1744';
    
    for (let mine of campaignMines) {
        if (mine.triggerCooldown > 0) {
            mine.triggerCooldown--;
            if (mine.triggerCooldown === 0) {
                mine.triggered = false;
            }
        }
        
        mine.pulse += 0.08;
        
        push();
        if (mine.triggered) {
            stroke('#424242');
            strokeWeight(1.5);
            fill('#212121');
            ellipse(mine.x, mine.y, mine.size);
            
            noFill();
            stroke('#888888');
            strokeWeight(1);
            let rechargeArc = map(mine.triggerCooldown, 0, 180, 0, TWO_PI);
            arc(mine.x, mine.y, mine.size - 6, mine.size - 6, -HALF_PI, -HALF_PI + rechargeArc);
        } else {
            let glowSize = mine.size + 6 * sin(mine.pulse);
            noStroke();
            fill(color(255, 23, 68, 50 + 15 * sin(mine.pulse)));
            ellipse(mine.x, mine.y, glowSize * 1.5);
            
            stroke('#1a0003');
            strokeWeight(2);
            fill(mineCol);
            ellipse(mine.x, mine.y, mine.size);
            
            fill(255);
            noStroke();
            ellipse(mine.x, mine.y, mine.size * 0.4);
            
            stroke('#ff1744');
            strokeWeight(2.5);
            for (let a = 0; a < TWO_PI; a += PI/4) {
                let sx = mine.x + cos(a) * (mine.size/2 + 2);
                let sy = mine.y + sin(a) * (mine.size/2 + 2);
                line(mine.x + cos(a) * (mine.size/2 - 2), mine.y + sin(a) * (mine.size/2 - 2), sx, sy);
            }
            
            for (let ent of entities) {
                if (isResettingPositions || isEvacuating || isGoalCelebrating || isKickOffActive) continue;
                let d = dist(ent.p.x, ent.p.y, mine.x, mine.y);
                let minDist = ent.d/2 + mine.size/2;
                if (d < minDist) {
                    mine.triggered = true;
                    mine.triggerCooldown = 180;
                    
                    let forceDir = p5.Vector.sub(ent.p, createVector(mine.x, mine.y));
                    if (forceDir.mag() < 0.1) forceDir = p5.Vector.random2D();
                    forceDir.normalize().mult(random(14, 20));
                    ent.v.add(forceDir);
                    
                    shakeAmount = 15;
                    triggerVibrate(60);
                    playSound('wall', 1.8);
                    
                    for (let i = 0; i < 20; i++) {
                        let pColor = random() > 0.4 ? '#ff5722' : '#ffea00';
                        particles.push(new Particle(mine.x + random(-5, 5), mine.y + random(-5, 5), pColor, 1.8));
                    }
                    break;
                }
            }
        }
        pop();
    }
}

function updateAndDrawPortals() {
    for (let portal of campaignPortals) {

        push();
        noStroke();
        let glowSize = portal.size + 10 * sin(portal.pulse * 2);
        let c = color(portal.color);
        c.setAlpha(40 + 15 * sin(portal.pulse));

        noFill();
        stroke(portal.color);
        strokeWeight(3.5 + 1.5 * sin(portal.pulse));
        ellipse(portal.x, portal.y, portal.size);
        
        fill('#000000');
        stroke(portal.color);
        strokeWeight(1);
        ellipse(portal.x, portal.y, portal.size - 6);
        
        push();
        translate(portal.x, portal.y);
        rotate(portal.pulse * 3);
        stroke(portal.color);
        strokeWeight(2.5);
        for (let i = 0; i < 4; i++) {
            let angle = i * HALF_PI;
            point(cos(angle) * (portal.size/2 - 6), sin(angle) * (portal.size/2 - 6));
        }
        pop();
        pop();
        
        for (let [ent, cd] of portal.cooldowns.entries()) {
            if (cd > 0) {
                portal.cooldowns.set(ent, cd - 1);
            } else {
                portal.cooldowns.delete(ent);
            }
        }
        
        for (let ent of entities) {
            if (isResettingPositions || isEvacuating || isGoalCelebrating) continue;
            let d = dist(ent.p.x, ent.p.y, portal.x, portal.y);
            if (d < portal.size/2 + ent.d/4) {
                if (!portal.cooldowns.has(ent)) {
                    ent.p.x = portal.targetX;
                    ent.p.y = portal.targetY;
                    
                    for (let i = 0; i < 15; i++) {
                        particles.push(new Particle(portal.x, portal.y, portal.color, 1.2));
                        particles.push(new Particle(portal.targetX, portal.targetY, portal.color, 1.2));
                    }
                    
                    playSound('wall', 0.85);
                    triggerVibrate(30);
                    
                    for (let pEnd of campaignPortals) {
                        pEnd.cooldowns.set(ent, 120);
                    }
                }
            }
        }
    }
}

function updateAndDrawVortices() {
    for (let v of campaignVortices) {
        v.pulse += 0.04;
        
        push();
        noFill();
        strokeWeight(1.5);
        let waveCount = 3;
        for (let i = 0; i < waveCount; i++) {
            let r = ((v.pulse * 40 + i * (v.radius / waveCount)) % v.radius);
            let alpha = map(r, 0, v.radius, 140, 0);
            stroke(30, 144, 255, alpha);
            ellipse(v.x, v.y, r * 2);
        }
        
        noStroke();
        fill('#000000');
        ellipse(v.x, v.y, 22);
        
        noFill();
        stroke('#ff9100');
        strokeWeight(3);
        ellipse(v.x, v.y, 28 + 4 * sin(v.pulse * 5));
        pop();
        
        if (campaignRollingFrameCounter > 210) continue; // Stop applying pull after 3.5 seconds to prevent infinite loops!

        for (let ent of entities) {
            if (isResettingPositions || isEvacuating || isGoalCelebrating) continue;
            let d = dist(ent.p.x, ent.p.y, v.x, v.y);
            if (d < v.radius && d > 10) {
                let pullDir = createVector(v.x - ent.p.x, v.y - ent.p.y).normalize();
                let forceStrength = map(d, 0, v.radius, v.pullStrength, v.pullStrength * 0.1);
                ent.v.add(pullDir.mult(forceStrength));
            }
        }
    }
}

function spawnTeamToPositions(teamColor, tacticName, isTop, arrayToPush) {
    let centerX = fieldX + fieldW / 2; 
    let chipD = 35;
    let lvl = isCampaign ? CAMPAIGN_LEVELS[currentLevel] : null;
    if (isCampaign && lvl && lvl.scenario === 'titans' && isTop) {
        chipD = 48; // Opponent titans are bigger and heavier (mass is automatically 12.0 for d > 45 in Entity class)!
    }
    let tempPositions = [];
    
    function getHorizontalCoordsForCount(count, lineY) {
        let coords = [];
        if (count === 1) {
            coords.push(createVector(centerX, lineY));
        } else if (count === 2) {
            coords.push(createVector(centerX - 55, lineY));
            coords.push(createVector(centerX + 55, lineY));
        } else if (count === 3) {
            coords.push(createVector(centerX, lineY));
            coords.push(createVector(centerX - 70, lineY));
            coords.push(createVector(centerX + 70, lineY));
        } else if (count === 4) {
            coords.push(createVector(centerX - 85, lineY));
            coords.push(createVector(centerX - 30, lineY));
            coords.push(createVector(centerX + 30, lineY));
            coords.push(createVector(centerX + 85, lineY));
        } else if (count === 5) {
            coords.push(createVector(centerX, lineY));
            coords.push(createVector(centerX - 45, lineY));
            coords.push(createVector(centerX + 45, lineY));
            coords.push(createVector(centerX - 90, lineY));
            coords.push(createVector(centerX + 90, lineY));
        }
        return coords;
    }

    if (tacticName === 'СВОЯ') {
        let savedPositions = isTop ? p2CustomPositions : p1CustomPositions;
        if (savedPositions.length === 0) tacticName = 'БАЛАНС';
        else { for (let offset of savedPositions) { tempPositions.push(createVector(centerX + offset.x, (fieldY + fieldH/2) + offset.y)); } }
    }

    if (tacticName !== 'СВОЯ') {
        let partition = [1, 2, 2]; // GK/Def, Mid, Att
        
        if (tacticName === 'БАЛАНС') {
            if (isEditingTactic) {
                partition = [1, 2, 2];
            } else {
                let subTactics = [
                    [1, 2, 2],
                    [2, 1, 2],
                    [1, 3, 1],
                    [2, 2, 1]
                ];
                partition = random(subTactics);
            }
        } else if (tacticName === 'АТАКА') {
            let subTactics = [
                [1, 1, 3],
                [0, 2, 3],
                [1, 0, 4],
                [2, 0, 3]
            ];
            partition = random(subTactics);
        } else if (tacticName === 'ЗАЩИТА') {
            let subTactics = [
                [3, 1, 1],
                [3, 2, 0],
                [4, 1, 0],
                [4, 0, 1]
            ];
            partition = random(subTactics);
        } else if (tacticName === 'РАНДОМ') {
            let bins = [0, 0, 0];
            for (let i = 0; i < 5; i++) {
                bins[floor(random(0, 3))]++;
            }
            partition = bins;
        }
        
        let defenders = partition[0];
        let midfielders = partition[1];
        let attackers = partition[2];
        
        // Define Y positions for the 3 lines
        let defY, midY, attY;
        if (isTop) {
            defY = fieldY + 60;
            midY = fieldY + fieldH * 0.22;
            attY = fieldY + fieldH * 0.37;
        } else {
            defY = fieldY + fieldH - 60;
            midY = fieldY + fieldH - fieldH * 0.22;
            attY = fieldY + fieldH - fieldH * 0.37;
        }
        
        // Defense line
        let defCoords = getHorizontalCoordsForCount(defenders, defY);
        for (let p of defCoords) tempPositions.push(p);
        
        // Midfield line
        let midCoords = getHorizontalCoordsForCount(midfielders, midY);
        for (let p of midCoords) tempPositions.push(p);
        
        // Attack line
        let attCoords = getHorizontalCoordsForCount(attackers, attY);
        for (let p of attCoords) tempPositions.push(p);
    }

    if (arrayToPush) { for(let pos of tempPositions) arrayToPush.push(pos); } 
    else { for(let pos of tempPositions) entities.push(new Entity(pos.x, pos.y, chipD, teamColor, false)); }
}

function checkCollisions() {
    for (let i = 0; i < entities.length; i++) {
        for (let j = i + 1; j < entities.length; j++) {
            let e1 = entities[i]; e2 = entities[j];
            let dx = e2.p.x - e1.p.x; let dy = e2.p.y - e1.p.y;
            let distSq = dx * dx + dy * dy; let minDist = (e1.d + e2.d) / 2;
            if (distSq < minDist * minDist) {
                let d = sqrt(distSq); 
                let normalX, normalY;
                if (d < 0.1) {
                    let angle = random(TWO_PI);
                    normalX = cos(angle);
                    normalY = sin(angle);
                    d = 0.1;
                } else {
                    normalX = dx / d;
                    normalY = dy / d;
                }
                let overlap = minDist - d;
                e1.p.x -= normalX * (overlap / 2); e1.p.y -= normalY * (overlap / 2);
                e2.p.x += normalX * (overlap / 2); e2.p.y += normalY * (overlap / 2);
                let vx = e2.v.x - e1.v.x; let vy = e2.v.y - e1.v.y; let vNormal = vx * normalX + vy * normalY;
                if (vNormal < 0) {
                    let totalMass = e1.mass + e2.mass; let impulse = (1.8 * vNormal) / totalMass; let strikeIntensity = abs(vNormal);
                    e1.v.x += impulse * e2.mass * normalX; e1.v.y += impulse * e2.mass * normalY;
                    e2.v.x -= impulse * e1.mass * normalX; e2.v.y -= impulse * e1.mass * normalY;
                    if (e1.isBall && !e2.isBall) lastTouchColor = e2.color;
                    if (e2.isBall && !e1.isBall) lastTouchColor = e1.color;
                    if (strikeIntensity > 2) { triggerVibrate(20); playSound('hit', strikeIntensity / 7); }
                    let sparkColor = e1.v.magSq() > e2.v.magSq() ? e1.color : e2.color;
                    if (strikeIntensity > 1.5) createSparks((e1.p.x + e2.p.x)/2, (e1.p.y + e2.p.y)/2, sparkColor, strikeIntensity);
                }
            }
        }
    }
}

function drawOriginalPull(chipPos) {
    let mousePos = createVector(mouseX, mouseY); let pullVec = p5.Vector.sub(mousePos, chipPos); let d = pullVec.mag();
    if (d > 8) {
        let maxPull = 130; let currentPull = min(d, maxPull); let angle = pullVec.heading();
        
        if (random() < 0.35) {
            let chargeAngle = random(TWO_PI);
            let chargeDist = random(35, 80);
            let chargeX = chipPos.x + cos(chargeAngle) * chargeDist;
            let chargeY = chipPos.y + sin(chargeAngle) * chargeDist;
            let chargeCol = selectedChip ? selectedChip.color : '#ffffff';
            let chargeP = new Particle(chargeX, chargeY, chargeCol, 0.1);
            chargeP.v = createVector(chipPos.x - chargeX, chipPos.y - chargeY).normalize().mult(random(1.5, 3));
            chargeP.alpha = 180;
            chargeP.update = function() {
                this.p.add(this.v);
                if (dist(this.p.x, this.p.y, chipPos.x, chipPos.y) < 15) {
                    this.alpha = 0;
                }
                this.alpha -= 8;
            };
            particles.push(chargeP);
        }

        push(); translate(chipPos.x, chipPos.y); rotate(angle);
        let currentAlpha = map(aimAlpha, 0, 50, 0, 110); fill(0, currentAlpha); noStroke(); ellipse(0, 0, selectedChip ? selectedChip.d * 3.8 : 130);
        stroke(255, map(aimAlpha, 0, 50, 0, 140)); strokeWeight(5); line(0, 0, currentPull, 0);
        fill(255, map(aimAlpha, 0, 50, 0, 200)); noStroke(); ellipse(currentPull, 0, 8, 8);
        let shootDist = map(currentPull, 0, maxPull, 30, 240); let baseAlpha = map(aimAlpha, 0, 50, 0, 160);
        let steps = 14;
        for (let i = 0; i < steps; i++) {
            let t1 = i / steps; let t2 = (i + 1) / steps;
            let x1 = -t1 * shootDist; let x2 = -t2 * shootDist;
            let w1 = map(t1, 0, 1, 12, 1); let w2 = map(t2, 0, 1, 12, 1);
            let a1 = map(t1, 0, 1, baseAlpha, 0); let a2 = map(t2, 0, 1, baseAlpha, 0);
            noStroke(); beginShape(); fill(color(255, a1)); vertex(x1, -w1 / 2); fill(color(255, a2)); vertex(x2, -w2 / 2); fill(color(255, a2)); vertex(x2, w2 / 2); fill(color(255, a1)); vertex(x1, w1 / 2); endShape(CLOSE);
        }
        pop();
    }
}

function isBallInCorner() {
    let ball = entities.find(e => e.isBall);
    if (!ball) return false;
    let threshold = 85; 
    if (dist(ball.p.x, ball.p.y, fieldX, fieldY) < threshold) return true;
    if (dist(ball.p.x, ball.p.y, fieldX + fieldW, fieldY) < threshold) return true;
    if (dist(ball.p.x, ball.p.y, fieldX, fieldY + fieldH) < threshold) return true;
    if (dist(ball.p.x, ball.p.y, fieldX + fieldW, fieldY + fieldH) < threshold) return true;
    return false;
}

function drawCornerIndicators() {
    let ball = entities.find(e => e.isBall);
    if (!ball) return;
    
    let threshold = 85;
    let corners = [
        { x: fieldX, y: fieldY, start: 0, end: HALF_PI },
        { x: fieldX + fieldW, y: fieldY, start: HALF_PI, end: PI },
        { x: fieldX, y: fieldY + fieldH, start: 1.5 * PI, end: TWO_PI },
        { x: fieldX + fieldW, y: fieldY + fieldH, start: PI, end: 1.5 * PI }
    ];
    
    for (let c of corners) {
        let d = dist(ball.p.x, ball.p.y, c.x, c.y);
        if (d < threshold) {
            push();
            let pulse = 130 + 70 * sin(frameCount * 0.12);
            
            stroke(255, 90, 0, pulse);
            strokeWeight(3.5);
            noFill();
            
            let steps = 12;
            let stepAngle = (c.end - c.start) / steps;
            for (let i = 0; i < steps; i += 2) {
                arc(c.x, c.y, threshold * 2, threshold * 2, c.start + i * stepAngle, c.start + (i + 1) * stepAngle);
            }
            
            fill(255, 90, 0, pulse * 0.08);
            noStroke();
            beginShape();
            vertex(c.x, c.y);
            for (let a = c.start; a <= c.end; a += 0.05) {
                vertex(c.x + cos(a) * threshold, c.y + sin(a) * threshold);
            }
            vertex(c.x, c.y);
            endShape(CLOSE);
            
            fill(255, 230, 200, pulse);
            textAlign(CENTER, CENTER);
            textSize(11);
            textStyle(BOLD);
            
            let labelY = c.y === fieldY ? c.y + threshold + 15 : c.y - threshold - 15;
            let labelX = c.x === fieldX ? c.x + threshold + 10 : c.x - threshold - 10;
            labelX = constrain(labelX, fieldX + 40, fieldX + fieldW - 40);
            labelY = constrain(labelY, fieldY + 40, fieldY + fieldH - 40);
            
            let turnsLeft = 3 - cornerTurns;
            let warnMsg = turnsLeft === 1 ? "ВЫВЕДИТЕ МЯЧ ЧЕРЕЗ 1 ХОД" : `ВЫВЕДИТЕ МЯЧ ЧЕРЕЗ ${turnsLeft} ХОДА`;
            if (cornerTurns >= 3) warnMsg = "СПОРНЫЙ МЯЧ!";
            
            fill(0, 160);
            rectMode(CENTER);
            rect(labelX, labelY, textWidth(warnMsg) + 16, 20, 5);
            
            fill(255, 110, 0, pulse);
            text(warnMsg, labelX, labelY);
            pop();
        }
    }
}

        ['1', '2', '3'],
        ['4', '5', '6'],
        ['7', '8', '9'],
        ['СБРОС', '0', 'ВОЙТИ']
    ];

    for (let r = 0; r < 4; r++) {

            let kx = keypadX + c * (kw + kGap);
            let ky = keypadY + r * (kh + kGap);
            let keyText = keys[r][c];
            
            let hKey = (mouseX > kx && mouseX < kx + kw && mouseY > ky && mouseY < ky + kh);
            
            push();
            let isAction = (keyText === 'СБРОС' || keyText === 'ВОЙТИ');
            if (isAction) {
                if (keyText === 'ВОЙТИ') {
                    fill(hKey ? 'rgba(88, 166, 255, 0.25)' : 'rgba(88, 166, 255, 0.12)');
                    stroke('#58a6ff');
                } else {
                    fill(hKey ? 'rgba(244, 67, 54, 0.25)' : 'rgba(244, 67, 54, 0.12)');
                    stroke('#f44336');
                }
                strokeWeight(1.2);
            } else {
                fill(hKey ? 'rgba(240, 246, 252, 0.1)' : 'rgba(22, 27, 34, 0.6)');
                stroke('#30363d');
                strokeWeight(1);
            }
            rect(kx, ky, kw, kh, 8);
            
            textAlign(CENTER, CENTER);
            textSize(isAction ? 11 : 16);
            textStyle(BOLD);
            if (keyText === 'ВОЙТИ') fill('#58a6ff');
            else if (keyText === 'СБРОС') fill('#f44336');
            else fill('#f0f6fc');
            
            text(keyText, kx + kw/2, ky + kh/2 + 1);
            pop();
        }
    }

    if (onlineRoomError) {
        push();
        textAlign(CENTER, CENTER);
        textSize(11);
        textStyle(BOLD);
        fill('#f44336');
        text(onlineRoomError, cx + cardW/2, keypadY + 4 * (kh + kGap) + 12);
        pop();
    }

    // Back Button
    let btnBack = { x: cx + 20, y: cy + cardH - 45, w: cardW - 40, h: 32 };
    let hBack = (mouseX > btnBack.x && mouseX < btnBack.x + btnBack.w && mouseY > btnBack.y && mouseY < btnBack.y + btnBack.h);
    drawStyledButton(btnBack, "ВЫЙТИ В МЕНЮ", hBack, '#21262d');
}

function initSocket() {
    if (socket) return;
    
    if (typeof io === 'undefined') {
        onlineRoomError = "Socket.io не загружен!";
        return;
    }
    
    socket = io();
    
    socket.on('roomCreated', (roomState) => {
        onlineRoomId = roomState.id;
        onlineMyRole = 'PLAYER1';
        onlineP1Connected = true;
        onlineP2Connected = false;
        onlineP1Ready = false;
        onlineP2Ready = false;
        onlineRoomError = '';
        gameState = 'ONLINE_LOBBY';
        p1ColorIdx = roomState.p1.colorIdx;
    });
    
    socket.on('roomJoined', (roomState) => {
        onlineRoomId = roomState.id;
        onlineMyRole = 'PLAYER2';
        onlineP1Connected = true;
        onlineP2Connected = true;
        onlineP1Ready = roomState.p1.ready;
        onlineP2Ready = roomState.p2.ready;
        onlineRoomError = '';
        gameState = 'ONLINE_LOBBY';
        p1ColorIdx = roomState.p1.colorIdx;
        p2ColorIdx = roomState.p2.colorIdx;
    });
    
    socket.on('colorChanged', (data) => {
        p1ColorIdx = data.p1ColorIdx;
        p2ColorIdx = data.p2ColorIdx;
        PLAYER1_COLOR = TEAM_COLORS[p1ColorIdx].value;
        PLAYER2_COLOR = TEAM_COLORS[p2ColorIdx].value;
    });
    
    socket.on('readyChanged', (data) => {
        onlineP1Ready = data.p1Ready;
        onlineP2Ready = data.p2Ready;
    });
    
    socket.on('matchStart', (data) => {
        p1ColorIdx = data.p1ColorIdx;
        p2ColorIdx = data.p2ColorIdx;
        isOnline = true;
        isVsBot = false;
        isCampaign = false;
        isTournament = false;
        
        startGameMatch();
    });
    
    socket.on('opponentShoot', (data) => {
        let ent = entities[data.index];
        if (ent) {
            let force = createVector(data.forceX, data.forceY);
            ent.v.add(force);
            
            triggerVibrate(25);
            turnShotClock = 15;
            currentTurnIdleTime = 0;
            currentTurn = (currentTurn === PLAYER1_COLOR) ? PLAYER2_COLOR : PLAYER1_COLOR;
            turnSwitchedThisRoll = true;
        }
    });
    
    socket.on('syncPositions', (data) => {
        if (data.positions && data.positions.length === entities.length) {
            for (let i = 0; i < entities.length; i++) {
                entities[i].p.x = data.positions[i].x;
                entities[i].p.y = data.positions[i].y;
                entities[i].v.set(0, 0);
            }
        }
    });
    
    socket.on('rematchTriggered', () => {
        onlineP1Ready = false;
        onlineP2Ready = false;
        isOnline = true;
        gameState = 'ONLINE_LOBBY';
        entities = [];
    });
    
    socket.on('opponentDisconnected', () => {
        if (gameState === 'ONLINE_LOBBY') {
            onlineP2Connected = false;
            onlineP2Ready = false;
            onlineRoomError = 'Соперник отключился!';
        } else if (gameState === 'GAME') {
            onlineOpponentDisconnected = true;
            if (onlineMyRole === 'PLAYER1') {
                triggerWin('КРАСНЫЕ');
            } else {
                triggerWin('СИНИЕ');
            }
        }
    });
    
    socket.on('errorMsg', (msg) => {
        onlineRoomError = msg;
    });
}

function disconnectSocket() {
    if (socket) {
        socket.disconnect();
        socket = null;
    }
    isOnline = false;
    onlineRoomId = '';
    onlineMyRole = null;
    onlineP1Connected = false;
    onlineP2Connected = false;
    onlineP1Ready = false;
    onlineP2Ready = false;
    onlineInputRoomCode = '';
    onlineRoomError = '';
    onlineOpponentDisconnected = false;
}

function drawWinOverlay() {
    push(); textAlign(CENTER, CENTER); textFont('Arial, sans-serif'); textStyle(BOLD);
    textSize(40); fill(255); stroke(0); strokeWeight(8);
    let winText = `ПОБЕДА:\n${matchWinner}!`;
    if(isCampaign) winText = (p1Goals > p2Goals) ? "УРОВЕНЬ ПРОЙДЕН!" : "ВЫ ПРОИГРАЛИ!";
    if(isOnline && onlineOpponentDisconnected) {
        winText = "СОПЕРНИК ВЫШЕЛ!\nТЕХНИЧЕСКАЯ ПОБЕДА!";
    }
    text(winText, width / 2, height * 0.43);
    pop();
}
// Этот код принудительно убирает лишние отступы при запуске на телефоне
window.addEventListener('load', () => {
    setTimeout(() => {
        window.scrollTo(0, 1);
        if (typeof windowResized === 'function') {
            windowResized();
        }
    }, 300);
});

function windowResized() {
    if (windowWidth > windowHeight) {
        return; 
    }
    resizeCanvas(windowWidth, windowHeight); 
    calculateFieldMetrics(); 
}
